<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#17365d">
<title>RyanOS 3.0.0</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--navy:#17365d;--blue:#1f4e78;--bg:#f3f6fa;--card:#fff;--text:#1f2937;--muted:#667085;--border:#d9e2ec;--good:#138a4b;--bad:#b42318;--warn:#fff2cc}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--navy);color:#fff;padding:16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:22px}header small{display:block;opacity:.8;margin-top:2px}
button,input,select,textarea{font:inherit}button{border:0;border-radius:9px;padding:9px 12px;background:var(--blue);color:#fff}
button.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}button.danger{background:#fff;color:var(--bad);border:1px solid var(--bad)}
.shell{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 72px)}
nav{background:#102a49;padding:10px;position:sticky;top:72px;height:calc(100vh - 72px);overflow:auto}
nav button{display:block;width:100%;text-align:left;background:transparent;margin:3px 0}nav button.active{background:#2d5f90}
main{padding:18px;max-width:1400px;width:100%;margin:auto}.page{display:none}.page.active{display:block}
h2{margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;box-shadow:0 2px 8px rgba(23,54,93,.06)}
.card h3{margin:0 0 8px;color:var(--muted);font-size:14px}.metric{font-size:28px;font-weight:750}.good{color:var(--good)}.bad{color:var(--bad)}
.notice{background:var(--warn);padding:12px;border-radius:10px;margin:12px 0}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:9px;border-bottom:1px solid var(--border);text-align:left;font-size:13px;vertical-align:top}th{background:#edf3f9}
input,select,textarea{border:1px solid #b8c5d1;border-radius:8px;padding:8px;background:#fff;max-width:100%}input[type=number]{width:120px}textarea{width:100%;min-height:90px}
.progress{height:11px;border-radius:99px;background:#e5e7eb;overflow:hidden}.progress span{display:block;height:100%;background:var(--good)}
.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
@media(max-width:900px){.shell{grid-template-columns:1fr}nav{position:static;height:auto;display:flex;overflow:auto;gap:4px}nav button{min-width:max-content}.grid,.grid.two,.form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.grid,.grid.two,.form-grid{grid-template-columns:1fr}main{padding:12px}.metric{font-size:24px}}

.today{background:linear-gradient(135deg,#17365d,#2d6ea6);color:white;border-radius:16px;padding:18px;margin-bottom:12px}
.today h2{margin:0 0 4px}.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:12px 0}
.kpi{background:white;border:1px solid var(--border);border-radius:12px;padding:12px}.kpi small{display:block;color:var(--muted)}.kpi strong{font-size:21px}
.ring{width:112px;height:112px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--good) calc(var(--score)*1%),#e5e7eb 0);position:relative;margin:auto}
.ring:after{content:"";position:absolute;width:82px;height:82px;border-radius:50%;background:white}.ring b{z-index:1;font-size:27px}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr 1fr}}@media(max-width:620px){.kpis{grid-template-columns:1fr 1fr}}

.report-bars{display:flex;align-items:flex-end;gap:10px;height:220px;padding:18px 8px 0;border-bottom:1px solid var(--border)}
.report-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:34px}
.report-bar{width:100%;max-width:54px;background:#2d6ea6;border-radius:6px 6px 0 0;min-height:2px}
.report-col span{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;word-break:break-word}
.alert-row{background:#fff3f2}.optimizer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.range-wrap{display:grid;grid-template-columns:1fr 100px;gap:10px;align-items:center}
input[type=range]{width:100%}
@media(max-width:700px){.optimizer-grid{grid-template-columns:1fr}.report-bars{overflow-x:auto;justify-content:flex-start}.report-col{min-width:52px}}

</style>
</head>

 if(Array.isArray(raw.transactions))out.transactions=raw.transactions.map(function(t){return{date:t.date||"",description:t.description||t.desc||"",amount:Number(t.amount||0),category:t.category||t.cat||"Miscellaneous",include:t.include||t.inc||"Yes"};});
 if(Array.isArray(raw.tx))out.transactions=raw.tx.map(function(t){return{date:t.date||"",description:t.description||t.desc||"",amount:Number(t.amount||0),category:t.category||t.cat||"Miscellaneous",include:t.include||t.inc||"Yes"};});
 if(Array.isArray(raw.rules))out.rules=raw.rules.map(function(r){return{keyword:r.keyword||r.key||"",category:r.category||r.cat||"Miscellaneous",include:r.include||r.inc||"Yes"};});
 return out;
}

function money(n){return new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}).format(Number(n||0));}
function pmt(rate,n,pv){var r=rate/1200;return r===0?pv/n:(r*pv)/(1-Math.pow(1+r,-n));}
function totals(){
 var s=data.settings;
 var income=s.income1+s.income2+s.wcb;
 var spending=data.budget.reduce(function(a,x){return a+Number(x[1]||0);},0);
 var locPayment=pmt(s.rate,s.months,s.loc);
 var goalFunding=data.goals.filter(function(g){return g.name!=="LOC";}).reduce(function(a,g){return a+Number(g.monthly||0);},0);
 var surplus=income-spending-s.investing-s.bills-s.chores-locPayment-goalFunding;
 var assets=s.home+s.ns1+s.ns2+s.vehicles+s.boat+s.camper+s.cash+s.investments;
 var debt=s.loc+s.ccDebt;
 return{income:income,spending:spending,locPayment:locPayment,goalFunding:goalFunding,surplus:surplus,assets:assets,debt:debt,networth:assets-debt};
}
function actualSpend(){return data.transactions.filter(function(t){return t.include==="Yes";}).reduce(function(a,t){return a+Math.abs(Number(t.amount||0));},0);}

function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

}
function financialHealth(){
 var t=totals();
 var month=data.reportMonth||data.review.month||new Date().toISOString().slice(0,7);
 var monthTx=monthTransactions(month);
 var monthSpend=monthTx.filter(function(x){return x.include==="Yes";}).reduce(function(a,x){return a+Math.abs(Number(x.amount||0));},0);
 var budgetPoints;
 var budgetNote;
 if(monthTx.length===0){
  budgetPoints=15;
  budgetNote="No transactions imported for "+month+"; neutral score used.";
 }else{
  var ratio=t.spending>0?monthSpend/t.spending:1;
  budgetPoints=ratio<=0.90?25:ratio<=1?25-(ratio-0.90)*100:Math.max(0,15-(ratio-1)*75);
  budgetNote=money(monthSpend)+" spent against "+money(t.spending)+" monthly budget.";
 }
 budgetPoints=Math.round(Math.max(0,Math.min(25,budgetPoints)));

 var cashRatio=t.income>0?t.surplus/t.income:0;
 var cashPoints=cashRatio>=0.10?20:cashRatio>=0?15:cashRatio>=-0.05?8:0;
 var cashNote="Planned monthly result: "+money(t.surplus)+".";

 var locGoal=data.goals.find(function(g){return String(g.name||"").toUpperCase()==="LOC";});
 var locStart=Math.max(Number(locGoal&&locGoal.target||0),23000,Number(data.settings.loc||0));
 var debtProgress=locStart>0?(locStart-Number(data.settings.loc||0))/locStart:1;
 var debtPoints=Math.round(15*Math.max(0,Math.min(1,debtProgress)));
 var debtNote="LOC balance: "+money(data.settings.loc)+" from a "+money(locStart)+" starting balance.";

 var emergency=data.goals.find(function(g){return String(g.name||"").toLowerCase().indexOf("emergency")>=0;});
 var emergencyProgress=emergency&&Number(emergency.target)>0?Number(emergency.current||0)/Number(emergency.target):0;
 var emergencyPoints=Math.round(15*Math.max(0,Math.min(1,emergencyProgress)));
 var emergencyNote=emergency?money(emergency.current)+" saved toward "+money(emergency.target)+".":"No emergency-fund goal found.";

 var incomplete=data.goals.filter(function(g){return g.name!=="LOC"&&Number(g.current||0)<Number(g.target||0);});
 var funded=incomplete.filter(function(g){return Number(g.monthly||0)>0;}).length;
 var goalPoints=incomplete.length?Math.round(10*funded/incomplete.length):10;
 var goalNote=funded+" of "+incomplete.length+" incomplete non-LOC goals have monthly funding.";

 var nwPoints=5,nwNote="Add two net-worth snapshots to measure the trend.";
 if(data.netWorthHistory.length>=2){
  var sorted=data.netWorthHistory.slice().sort(function(a,b){return String(a.month).localeCompare(String(b.month));});
  var prev=Number(sorted[sorted.length-2].value||0),latest=Number(sorted[sorted.length-1].value||0);
  var change=latest-prev;
  nwPoints=change>0?10:change===0?6:0;
  nwNote="Latest net-worth change: "+money(change)+".";
 }

 var retire=projection(data.settings.retireAge);
 var wifeAge=data.settings.retireAge-data.settings.wifeAgeDiff;
 var guaranteed=(wifeAge>=data.settings.wifeRetireAge?data.settings.wifePension*12:0);
 if(data.settings.retireAge>=data.settings.userCppStart)guaranteed+=(data.settings.userCppStart===70?data.settings.userCpp70:data.settings.userCpp65)*12;
 var capitalTarget=Math.max(0,(retire.spend-guaranteed)*25);
 var retirementRatio=capitalTarget>0?retire.inv/capitalTarget:1;
 var retirementPoints=Math.round(5*Math.max(0,Math.min(1,retirementRatio)));
 var retirementNote="Projected investments at "+data.settings.retireAge+": "+money(retire.inv)+"; rough capital target: "+money(capitalTarget)+".";

 var parts=[
  {name:"Monthly budget",points:budgetPoints,max:25,note:budgetNote},

  {name:"LOC reduction",points:debtPoints,max:15,note:debtNote},

  {name:"Goal funding",points:goalPoints,max:10,note:goalNote},

  {name:"Retirement progress",points:retirementPoints,max:5,note:retirementNote}
 ];
 var total=parts.reduce(function(a,x){return a+x.points;},0);
 return{total:Math.max(0,Math.min(100,total)),parts:parts,month:month};
}

function splitCsvLine(line){
 var out=[],cur="",quoted=false;
 for(var i=0;i<line.length;i++){
  var ch=line[i];
  if(ch==='"'){
   if(quoted&&line[i+1]==='"'){cur+='"';i++;}
   else quoted=!quoted;
  }else if(ch===","&&!quoted){out.push(cur);cur="";}
  else cur+=ch;
 }
 out.push(cur);
 return out;
}
function findHeaderRow(lines){
 for(var i=0;i<Math.min(lines.length,25);i++){
  var cols=splitCsvLine(lines[i]).map(function(x){return String(x).trim().toLowerCase();});
  var hasDate=cols.some(function(h){return h.indexOf("date")>=0;});
  var hasAmount=cols.some(function(h){return h.indexOf("amount")>=0||h.indexOf("debit")>=0||h.indexOf("credit")>=0;});
  var hasDesc=cols.some(function(h){return h.indexOf("description")>=0||h.indexOf("merchant")>=0||h.indexOf("details")>=0||h.indexOf("payee")>=0;});
  if(hasDate&&hasAmount&&hasDesc)return i;
 }

}

 var n=Number(s);
 return isNaN(n)?0:n;
}

function categorize(desc){
 var special=specialCategory(desc);if(special)return special;
 var d=cleanDescription(desc),matches=[];
 smartRules.forEach(function(r){if(d.indexOf(r[0])>=0)matches.push({keyword:r[0],category:r[1],include:"Yes",source:"smart"});});
 data.rules.forEach(function(r){
  if(!r||typeof r!=="object")return;
  var k=String(r.keyword||"").toUpperCase().trim();
  if(k&&d.indexOf(k)>=0)matches.push({keyword:k,category:r.category||"Needs Review",include:r.include||"Yes",source:"user"});
 });
 if(!matches.length)return{category:"Needs Review",include:"Yes",confidence:"low"};
 matches.sort(function(a,b){
  if(a.source!==b.source)return a.source==="user"?-1:1;
  return b.keyword.length-a.keyword.length;
 });
 return{category:matches[0].category,include:matches[0].include,confidence:matches[0].source==="user"?"high":"medium"};
}
function parseCsv(text){
 var lines=text.replace(/^\uFEFF/,"").split(/\r?\n/);
 var headerRow=findHeaderRow(lines);
 if(headerRow<0)return[];
 lines=lines.slice(headerRow);
 var headers=splitCsvLine(lines.shift()).map(function(x){return x.trim().toLowerCase();});
 function find(names){return headers.findIndex(function(h){return names.some(function(n){return h.indexOf(n)>=0;});});}
 var di=find(["transaction date","date posted","posting date","date"]);
 var xi=find(["description","details","merchant","payee"]);
 var ai=find(["transaction amount","amount"]);
 var debitI=find(["debit","withdrawal"]);
 var creditI=find(["credit","deposit"]);
 var typeI=find(["transaction type"]);
 var existing={};data.transactions.forEach(function(t){existing[txKey(t)]=true;});
 var imported=[];
 lines.forEach(function(line){
  if(!line.trim())return;
  var c=splitCsvLine(line);
  if(c.length<3)return;
  var desc=(c[xi]||"").trim();
  if(!desc)return;
  var amount=ai>=0?parseAmount(c[ai]):0;
  if(ai<0){
   var debit=debitI>=0?parseAmount(c[debitI]):0;
   var credit=creditI>=0?parseAmount(c[creditI]):0;
   amount=credit?credit:-Math.abs(debit);
  }
  if(typeI>=0){
   var typ=String(c[typeI]||"").trim().toUpperCase();
   if(typ==="DEBIT"&&amount>0)amount=-amount;
   if(typ==="CREDIT"&&amount<0)amount=Math.abs(amount);
  }
  var r=categorize(desc),t={date:normalizeDate(c[di]||""),description:desc,merchant:cleanDescription(desc),amount:amount,category:r.category,include:r.include,confidence:r.confidence};
  if(!existing[txKey(t)]){existing[txKey(t)]=true;imported.push(t);}
 });
 return imported;
}

function spendingEstimate(){
 var s=data.settings;
 var lookback=Math.max(1,Math.min(24,Number(s.spendingLookbackMonths||12)));
 var now=new Date();
 var currentMonthStart=new Date(now.getFullYear(),now.getMonth(),1);
 var start=new Date(now.getFullYear(),now.getMonth()-lookback,1);
 var monthly={};

 data.transactions.forEach(function(t){
  var d=txDateObj(t.date);
  if(!d||d<start||d>=currentMonthStart||t.include!=="Yes")return;
  var key=monthKeyFromDate(d);
  if(!monthly[key])monthly[key]={core:0,total:0,count:0};
  var amount=Math.abs(Number(t.amount||0));
  monthly[key].total+=amount;
  if(coreSpendingCategory(t.category))monthly[key].core+=amount;
  monthly[key].count++;
 });

 var keys=Object.keys(monthly).sort();
 var coreMonths=keys.map(function(k){return monthly[k].core;});
 var totalMonths=keys.map(function(k){return monthly[k].total;});
 function average(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:0;}
 function median(a){
  if(!a.length)return 0;
  var b=a.slice().sort(function(x,y){return x-y;});
  var mid=Math.floor(b.length/2);
  return b.length%2?b[mid]:(b[mid-1]+b[mid])/2;
 }

 var avgCore=average(coreMonths);
 var medCore=median(coreMonths);
 var avgTotal=average(totalMonths);
 var useMedian=coreMonths.length>=3;
 var selectedMonthlyCore=useMedian?medCore:avgCore;
 var annualizedCore=selectedMonthlyCore*12;
 var annualizedTotal=avgTotal*12;
 var retirementEstimate=annualizedCore+Number(s.irregularAnnualAllowance||0);

 return{
  lookback:lookback,observedMonths:keys.length,monthKeys:keys,monthly:monthly,
  averageMonthlyCore:avgCore,medianMonthlyCore:medCore,selectedMonthlyCore:selectedMonthlyCore,
  annualizedTotal:annualizedTotal,annualizedCore:annualizedCore,
  irregularAllowance:Number(s.irregularAnnualAllowance||0),

 var pension=(!wifeWorking&&wifeAge>=Number(s.wifeRetireAge))?

 var cppMonths=Math.max(0,(userAge-Number(s.userCppStart))*12);

 var wifeOasMonths=Math.max(0,(wifeAge-Number(s.wifeOasStart))*12);

 var wifeCpp=wifeAge>=Number(s.wifeCppStart)?wifeCppBase*Math.pow(1+inflationMonthly,wifeCppMonths):0;

function withdrawNetFromAccount(accounts,key,netNeeded,taxRate){

 var available=Math.max(0,Number(accounts[key]||0));
 var grossNeeded=tax>=.99?netNeeded:netNeeded/(1-tax);
 var gross=Math.min(available,grossNeeded);
 accounts[key]=available-gross;
 return{gross:gross,net:gross*(1-tax),tax:gross*tax};
}
function retirementWithdrawalOrder(){
 var strategy=Number(data.settings.withdrawalStrategy||1);
 if(strategy===2)return["tfsa","nonReg","rrsp","wifeRrsp"];
 if(strategy===3)return["nonReg","rrsp","wifeRrsp","tfsa"];
 return["rrsp","wifeRrsp","nonReg","tfsa"];
}
function retirementSimulation(returnRate){
 var s=data.settings;
 var currentAge=Number(s.age||0);
 var retireAge=Math.max(currentAge,Number(s.retireAge||currentAge));
 var endAge=Math.max(retireAge+1,Number(s.retirementEndAge||95));
 var totalMonths=Math.ceil((endAge-currentAge)*12);
 var retirementMonth=Math.max(0,Math.round((retireAge-currentAge)*12));
 var investmentRate=monthlyRate(returnRate);
 var inflationRate=monthlyRate(s.inflation);
 var pensionTax=Math.max(0,Math.min(.6,Number(s.retirementTaxRate||0)/100));
 var nonRegTax=Math.max(0,Math.min(.6,Number(s.nonRegisteredWithdrawalTaxRate||0)/100));
 var bracketTax=Math.max(0,Math.min(.6,Number(s.lowestBracketMarginalTaxRate||0)/100));

 var accounts={
  rrsp:Number(s.rrspBalance||0),
  wifeRrsp:Number(s.wifeRrspBalance||0),
  tfsa:Number(s.userTfsaBalance||0),
  nonReg:Number(s.nonRegisteredBalance||0)
 };
 var startingDetailedTotal=accountTotal(accounts);
 var tfsaRoom=Math.max(0,Number(s.tfsaAvailableRoom||0));
 var annualTfsaRoom=Math.max(0,Number(s.tfsaAnnualLimit||0));

 var monthlyContrib={
  rrsp:Math.max(0,Number(s.rrspMonthlyContribution||0)),
  wifeRrsp:Math.max(0,Number(s.wifeRrspMonthlyContribution||0)),
  tfsa:Math.max(0,Number(s.userTfsaMonthlyContribution||0)),
  nonReg:Math.max(0,Number(s.nonRegisteredMonthlyContribution||0))
 };

 var annualRows=[],year=null,depletionAge=null;
 var inheritanceDone=false,expenseDone=false;

 function openYear(age,wifeAge){
  return{
   age:age,wifeAge:wifeAge,startAccounts:cleanAccountSnapshot(accounts),startBalance:accountTotal(accounts),
   contributions:0,inheritance:0,externalNet:0,spending:0,specialExpense:0,
   rrspWithdrawal:0,wifeRrspWithdrawal:0,tfsaWithdrawal:0,nonRegWithdrawal:0,
   withdrawalTax:0,strategicRrsp:0,strategicTax:0,tfsaTransfer:0,nonRegTransfer:0,
   growth:0,endAccounts:null,endBalance:0,unfunded:0
  };
 }
 function closeYear(){
  if(!year)return;
  year.endAccounts=cleanAccountSnapshot(accounts);
  year.endBalance=accountTotal(accounts);
  annualRows.push(year);
 }

 for(var month=0;month<totalMonths;month++){
  var userAge=currentAge+month/12;
  var wifeAge=userAge-Number(s.wifeAgeDiff||0);
  var retired=month>=retirementMonth;

  if(retired){
   var retirementYearIndex=Math.floor((month-retirementMonth)/12);
   if((month-retirementMonth)%12===0){
    closeYear();
    year=openYear(userAge,wifeAge);
    if(retirementYearIndex>0)tfsaRoom+=annualTfsaRoom;
   }
  }

  if(!retired){
   accounts.rrsp+=monthlyContrib.rrsp;
   accounts.wifeRrsp+=monthlyContrib.wifeRrsp;
   accounts.tfsa+=monthlyContrib.tfsa;
   accounts.nonReg+=monthlyContrib.nonReg;
  }

  if(!inheritanceDone&&userAge>=Number(s.inheritanceAge||999)&&Number(s.inheritanceAmount||0)>0){
   accounts.nonReg+=Number(s.inheritanceAmount||0);
   inheritanceDone=true;
   if(year)year.inheritance+=Number(s.inheritanceAmount||0);
  }

  var extraExpense=0;
  if(!expenseDone&&userAge>=Number(s.oneTimeExpenseAge||999)&&Number(s.oneTimeExpenseAmount||0)>0){
   extraExpense=Number(s.oneTimeExpenseAmount||0);
   expenseDone=true;
   if(year)year.specialExpense+=extraExpense;
  }

  if(retired){
   var inc=benefitIncomeAtMonth(userAge,wifeAge,month);
   var taxableBenefits=inc.pension+inc.cpp+inc.wifeCpp+inc.oas+inc.wifeOas;
   var externalNet=inc.wifeEmploymentNet+inc.wcb+taxableBenefits*(1-pensionTax);
   var spending=retirementSpendingBase()/12*Math.pow(1+inflationRate,month);
   var need=Math.max(0,spending+extraExpense-externalNet);

   year.externalNet+=externalNet;
   year.spending+=spending;

   var order=retirementWithdrawalOrder();
   for(var oi=0;oi<order.length&&need>0.01;oi++){
    var key=order[oi];
    var tax=key==="rrsp"||key==="wifeRrsp"?pensionTax:(key==="nonReg"?nonRegTax:0);
    var w=withdrawNetFromAccount(accounts,key,need,tax);
    need=Math.max(0,need-w.net);
    year.withdrawalTax+=w.tax;
    if(key==="rrsp")year.rrspWithdrawal+=w.gross;
    if(key==="wifeRrsp")year.wifeRrspWithdrawal+=w.gross;
    if(key==="tfsa")year.tfsaWithdrawal+=w.gross;
    if(key==="nonReg")year.nonRegWithdrawal+=w.gross;
   }

   // Once each retirement year, draw unused personal bracket room from the user's RRSP.
   if((month-retirementMonth)%12===0 &&
      Number(s.rrspDrawdownEnabled||0)===1 &&
      userAge>=Number(s.rrspDrawdownStartAge||55) &&
      userAge<Number(s.rrspDrawdownEndAge||70) &&
      accounts.rrsp>0){
    var annualPersonalCpp=(inc.cpp+inc.oas)*12;
    var bracketRoom=Math.max(0,Number(s.lowestTaxBracketCeiling||0)-annualPersonalCpp);
    var gross=Math.min(accounts.rrsp,bracketRoom);
    accounts.rrsp-=gross;
    var tax=gross*bracketTax;
    var net=gross-tax;
    var toTfsa=Math.min(net,tfsaRoom);
    accounts.tfsa+=toTfsa;
    tfsaRoom-=toTfsa;
    accounts.nonReg+=Math.max(0,net-toTfsa);
    year.strategicRrsp+=gross;
    year.strategicTax+=tax;
    year.tfsaTransfer+=toTfsa;
    year.nonRegTransfer+=Math.max(0,net-toTfsa);
   }

   if(need>0.01){
    year.unfunded+=need;
    if(depletionAge===null)depletionAge=userAge;
   }
  }

  var growth=0;
  ["rrsp","wifeRrsp","tfsa","nonReg"].forEach(function(key){
   var g=accounts[key]*investmentRate;
   accounts[key]+=g;
   growth+=g;
  });
  if(year)year.growth+=growth;
 }

 closeYear();

 return{
  rows:annualRows,
  retirementAge:retireAge,endAge:endAge,depletionAge:depletionAge,
  startingDetailedTotal:startingDetailedTotal,
  aggregateInvestmentSetting:Number(s.investments||0),
  retirementAccounts:annualRows.length?annualRows[0].startAccounts:cleanAccountSnapshot(accounts),
  retirementBalance:annualRows.length?annualRows[0].startBalance:accountTotal(accounts),
  endingAccounts:cleanAccountSnapshot(accounts),endingBalance:accountTotal(accounts),
  realEndingBalance:accountTotal(accounts)/Math.pow(1+Number(s.inflation||0)/100,endAge-currentAge)
 };
}

 if(!row)return{age:age,wifeAge:Number(age)-Number(s.wifeAgeDiff||0),inv:sim.retirementBalance,spend:0,income:0,gap:0};
 var netWithdrawals=row.rrspWithdrawal+row.wifeRrspWithdrawal+row.tfsaWithdrawal+row.nonRegWithdrawal-row.withdrawalTax;

 data.rules=(Array.isArray(data.rules)?data.rules:[]).filter(function(r){return r&&typeof r==="object"&&String(r.keyword||"").trim();}).map(function(r){return{keyword:String(r.keyword||""),category:String(r.category||"Needs Review"),include:String(r.include||"Yes")};});
 localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
 alert("Transaction repair complete. Kept "+repaired.length+" valid transactions.");
 render();
};
document.getElementById("reset").onclick=function(){if(confirm("Reset all data?")){data=clone(defaults);save();}};
}
function safeRender(id,fn){
 try{fn();}
 catch(err){
  console.error(id+" render failed:",err);
  var el=document.getElementById(id);
  if(el)el.innerHTML='<h2>'+id.replace(/^\w/,function(c){return c.toUpperCase();})+'</h2><div class="notice">This page could not load because some saved data was malformed. Export a backup, then use Settings → Import Backup after installing this repair.</div>';
 }
}
function render(){
 safeRender("home",renderHome);
 safeRender("money",renderMoney);
 safeRender("transactions",renderTransactions);
 safeRender("goals",renderGoals);
 safeRender("retirement",renderRetirement);
 safeRender("networth",renderNetWorth);
 safeRender("life",renderLife);
 safeRender("review",renderReview);
 safeRender("reports",renderReports);
 safeRender("settings",renderSettings);
}
document.getElementById("exportBtn").onclick=function(){data.review.lastBackup=new Date().toISOString();localStorage.setItem(STORAGE_KEY,JSON.stringify(data));var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="RyanOS-3.0.0-backup.json";a.click();};
if(!data.categorizationVersion||data.categorizationVersion<25){
 try{
  data.transactions.forEach(function(t){
   if(!t)return;
   var r=categorize(t.description||"");
   t.merchant=cleanDescription(t.description||"");
   t.category=r.category;
   t.include=r.include;
   t.confidence=r.confidence;
  });
  data.categorizationVersion=25;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
 }catch(err){

 }
}

nav();render();
