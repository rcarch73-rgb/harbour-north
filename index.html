:root{--navy:#17365d;--blue:#1f4e78;--bg:#f3f6fa;--card:#fff;--text:#1f2937;--muted:#667085;--border:#d9e2ec;--good:#138a4b;--bad:#b42318;--warn:#fff2cc}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--navy);color:#fff;padding:16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:22px}header small{display:block;opacity:.8;margin-top:2px}
button,input,select,textarea{font:inherit}button{border:0;border-radius:9px;padding:9px 12px;background:var(--blue);color:#fff}
button.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}button.danger{background:#fff;color:var(--bad);border:1px solid var(--bad)}
.shell{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 72px)}
nav{background:#102a49;padding:10px;position:sticky;top:72px;height:calc(100vh - 72px);overflow:auto}
nav button{display:block;width:100%;text-align:left;background:transparent;margin:3px 0}nav button.active{background:#2d5f90}
main{padding:18px;max-width:1400px;width:100%;margin:auto}.page{display:none}.page.active{display:block}
h2{margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;box-shadow:0 2px 8px rgba(23,54,93,.06)}
.card h3{margin:0 0 8px;color:var(--muted);font-size:14px}.metric{font-size:28px;font-weight:750}.good{color:var(--good)}.bad{color:var(--bad)}
.notice{background:var(--warn);padding:12px;border-radius:10px;margin:12px 0}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:9px;border-bottom:1px solid var(--border);text-align:left;font-size:13px;vertical-align:top}th{background:#edf3f9}
input,select,textarea{border:1px solid #b8c5d1;border-radius:8px;padding:8px;background:#fff;max-width:100%}input[type=number]{width:120px}textarea{width:100%;min-height:90px}
.progress{height:11px;border-radius:99px;background:#e5e7eb;overflow:hidden}.progress span{display:block;height:100%;background:var(--good)}
.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
@media(max-width:900px){.shell{grid-template-columns:1fr}nav{position:static;height:auto;display:flex;overflow:auto;gap:4px}nav button{min-width:max-content}.grid,.grid.two,.form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.grid,.grid.two,.form-grid{grid-template-columns:1fr}main{padding:12px}.metric{font-size:24px}}

.today{background:linear-gradient(135deg,#17365d,#2d6ea6);color:white;border-radius:16px;padding:18px;margin-bottom:12px}
.today h2{margin:0 0 4px}.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:12px 0}
.kpi{background:white;border:1px solid var(--border);border-radius:12px;padding:12px}.kpi small{display:block;color:var(--muted)}.kpi strong{font-size:21px}
.ring{width:112px;height:112px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--good) calc(var(--score)*1%),#e5e7eb 0);position:relative;margin:auto}
.ring:after{content:"";position:absolute;width:82px;height:82px;border-radius:50%;background:white}.ring b{z-index:1;font-size:27px}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr 1fr}}@media(max-width:620px){.kpis{grid-template-columns:1fr 1fr}}

.report-bars{display:flex;align-items:flex-end;gap:10px;height:220px;padding:18px 8px 0;border-bottom:1px solid var(--border)}
.report-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:34px}
.report-bar{width:100%;max-width:54px;background:#2d6ea6;border-radius:6px 6px 0 0;min-height:2px}
.report-col span{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;word-break:break-word}
.alert-row{background:#fff3f2}.optimizer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.range-wrap{display:grid;grid-template-columns:1fr 100px;gap:10px;align-items:center}
input[type=range]{width:100%}

/* RyanOS 4 streamlined shell */
:root{--ryan-blue:#17365d;--ryan-bg:#f4f7fb;--ryan-card:#fff;--ryan-line:#dbe3ee;--ryan-text:#1f2a37;--ryan-muted:#667085}
body{background:var(--ryan-bg);color:var(--ryan-text)}

}

 align-items:center;
 justify-content:center;

 height:auto!important;
 padding:10px 18px!important;
 margin:0!important;
 border-radius:12px!important;

 white-space:nowrap
}
main{

 width:100%!important;
 margin:0 auto!important;
 padding:18px!important;
 box-sizing:border-box
}
.page-intro{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:12px}
.page-intro h2{margin:0 0 4px}
.page-intro p{margin:0;color:var(--ryan-muted)}
.hero-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:12px 0}
.hero-card{background:var(--ryan-card);border:1px solid var(--ryan-line);border-radius:18px;padding:16px;box-shadow:0 4px 14px rgba(23,54,93,.05)}

.hero-card .value{font-size:1.55rem;font-weight:800;margin-top:6px}

.section-card h3{margin-top:0}
details.section-card{padding:0}
details.section-card summary{cursor:pointer;padding:16px;font-weight:800;list-style:none}
details.section-card summary::-webkit-details-marker{display:none}

.status-pill.good{background:#e9f7ef;color:#166534}

.status-pill.bad{background:#fdecec;color:#991b1b}

:root{
 --page-max:1180px;

function recommendedActions(){

 }

 if(debt.problems){

 }else if(debt.balance>0){

  if(highest){
   actions.push({priority:2,level:"medium",impact:"Medium impact",title:"Focus extra payments on "+(highest.name||"the highest-rate debt"),copy:"This debt has the highest listed rate at "+Number(highest.interestRate||0).toFixed(2)+"%. Directing extra payments here should reduce total interest fastest."});
  }
 }

 var incompleteGoals=(data.goals||[]).filter(function(g){return Number(g.current||0)<Number(g.target||0)&&g.name!=="LOC";}).sort(function(a,b){return Number(a.priority||999)-Number(b.priority||999);});
 if(incompleteGoals.length){

  actions.push({priority:3,level:"medium",impact:"Next priority",title:"Continue funding "+g.name,copy:money(remaining)+" remains to reach the target. Current monthly funding is "+money(Number(g.monthly||0))+"."});
 }

 var history=(data.netWorthHistory||[]);

  actions.push({priority:4,level:"low",impact:"Tracking",title:"Save another net worth snapshot",copy:"A second snapshot will create a meaningful trend line and month-to-month comparison."});
 }

 }

 if(!actions.length){

 actions.sort(function(a,b){return a.priority-b.priority;});

function healthcarePlanAnalysis(){
 var h=ensureHealthcarePlanner(),t=totals();
 var years=Math.max(.1,Number(h.yearsUntilRetirement||0));
 var months=Math.max(1,Math.round(years*12));
 var annualOngoing=
  Number(h.monthlyPremiums||0)*12+
  Number(h.annualDentalVision||0)+
  Number(h.annualMedications||0)+
  Number(h.annualTravelMedical||0)+
  Number(h.annualOther||0);
 var reserveGap=Math.max(0,Number(h.targetReserve||0)-Number(h.currentReserve||0));
 var monthlyReserve=reserveGap/months;
 var totalMonthlyNeed=monthlyReserve+annualOngoing/12;
 var capacity=Number(t.surplus||0);
 var gap=totalMonthlyNeed-capacity;
 var fundedPercent=Number(h.targetReserve||0)>0?Math.min(100,Number(h.currentReserve||0)/Number(h.targetReserve||0)*100):100;
 return{
  annualOngoing:annualOngoing,
  reserveGap:reserveGap,
  monthlyReserve:monthlyReserve,
  totalMonthlyNeed:totalMonthlyNeed,
  capacity:capacity,
  gap:gap,
  fundedPercent:fundedPercent,
  affordable:capacity>=totalMonthlyNeed
 };
}

function vehiclePlanAnalysis(){
 var v=ensureVehiclePlanner();
 var years=Math.max(.1,Number(v.yearsUntil||0));
 var months=Math.max(1,Math.round(years*12));
 var netCost=Math.max(0,Number(v.replacementCost||0)-Number(v.tradeInValue||0));
 var savingsNeed=Math.max(0,netCost-Number(v.downPayment||0));
 var monthlySave=savingsNeed/months;
 var financePrincipal=Math.max(0,netCost-Number(v.downPayment||0));
 var monthlyRate=Number(v.financeRate||0)/100/12;
 var n=Math.max(1,Math.round(Number(v.financeYears||0)*12));
 var financePayment=monthlyRate>0?financePrincipal*monthlyRate*Math.pow(1+monthlyRate,n)/(Math.pow(1+monthlyRate,n)-1):financePrincipal/n;
 var repairTotal=Math.max(0,Number(v.annualRepairCost||0))*years;
 var keepCost=repairTotal+Math.max(0,Number(v.currentValue||0)-Number(v.tradeInValue||0));
 var buyNowCost=netCost;
 var cashFlow=totals().surplus;
 var affordableSave=cashFlow>=monthlySave;
 var affordableFinance=cashFlow>=financePayment;
 return{
  months:months,
  netCost:netCost,
  monthlySave:monthlySave,
  financePayment:financePayment,
  repairTotal:repairTotal,
  keepCost:keepCost,
  buyNowCost:buyNowCost,
  affordableSave:affordableSave,
  affordableFinance:affordableFinance,
  cashFlow:cashFlow
 };
}
function ensurePurchasePlanner(){
 if(!data.purchasePlanner||typeof data.purchasePlanner!=="object"){
  var target=new Date();
  target.setMonth(target.getMonth()+12);
  data.purchasePlanner={

  };
 }
 return data.purchasePlanner;
}
function purchasePlanAnalysis(){
 var p=ensurePurchasePlanner(),t=totals();
 var target=new Date(String(p.targetDate||""));
 var now=new Date();
 var valid=!isNaN(target.getTime());
 var months=valid?Math.max(1,(target.getFullYear()-now.getFullYear())*12+(target.getMonth()-now.getMonth())+(target.getDate()>=now.getDate()?0:-1)):0;
 var remaining=Math.max(0,Number(p.amount||0)-Number(p.saved||0));
 var monthly=months>0?remaining/months:remaining;
 var capacity=Number(t.surplus||0);
 var gap=monthly-capacity;
 var status=remaining<=0?"funded":capacity>=monthly?"affordable":capacity>0?"partial":"unfunded";
 return{
  months:months,
  remaining:remaining,
  monthly:monthly,
  capacity:capacity,
  gap:gap,
  status:status,
  completion:monthly>0&&capacity>0?Math.ceil(remaining/capacity):0
 };
}

function cleanDescription(desc){
 var d=String(desc||"").toUpperCase().trim();
 d=d.replace(/^\[[A-Z]{2}\]\s*/,"");
 d=d.replace(/^ONLINE PURCHASE\s+[A-Z0-9]+/,"");
 d=d.replace(/^RECURRING PYMNT\s+[A-Z0-9]+/,"");
 d=d.replace(/\s+/g," ").trim();
 return d;
}
function specialCategory(desc){
 var d=cleanDescription(desc);
 if(/YELLOWHEAD|PROVINCE OF B\.?C|WCB OF BC|CANADA RIT|MOBILE CHEQUE DEPOSIT|BMO INV INC/.test(d))
  return{category:"Income",include:"No",confidence:"high"};
 if(/EDWARD JONES|ASSOMPTION VIE|SUN LIFE|CGHLI/.test(d))
  return{category:"Investments",include:"No",confidence:"high"};
 if(/TRSF FROM\/DE ACCT|^\s*TF\s+\d|INTERAC ETRNSFR|CREDIT CARD PAYMENT|MASTERCARD PAYMENT|BMO MC/.test(d))
  return{category:"Transfers",include:"No",confidence:"high"};
 if(/PLAN FEE|O\/D PROTECTION|CASH ADVANCE FEE|INTEREST ADVANCES/.test(d))
  return{category:"Bank Fees",include:"Yes",confidence:"high"};
 return null;
}
function splitCsvLine(line){
 var out=[],cur="",quoted=false;
 for(var i=0;i<line.length;i++){
  var ch=line[i];
  if(ch==='"'){
   if(quoted&&line[i+1]==='"'){cur+='"';i++;}
   else quoted=!quoted;
  }else if(ch===","&&!quoted){out.push(cur);cur="";}
  else cur+=ch;
 }
 out.push(cur);
 return out;
}
function findHeaderRow(lines){
 for(var i=0;i<Math.min(lines.length,25);i++){
  var cols=splitCsvLine(lines[i]).map(function(x){return String(x).trim().toLowerCase();});
  var hasDate=cols.some(function(h){return h.indexOf("date")>=0;});
  var hasAmount=cols.some(function(h){return h.indexOf("amount")>=0||h.indexOf("debit")>=0||h.indexOf("credit")>=0;});
  var hasDesc=cols.some(function(h){return h.indexOf("description")>=0||h.indexOf("merchant")>=0||h.indexOf("details")>=0||h.indexOf("payee")>=0;});
  if(hasDate&&hasAmount&&hasDesc)return i;
 }
 return -1;
}
function parseAmount(v){
 var s=String(v||"").replace(/[$,\s]/g,"");
 if(s.indexOf("(")>=0&&s.indexOf(")")>=0)s="-"+s.replace(/[()]/g,"");
 var n=Number(s);
 return isNaN(n)?0:n;
}
function normalizeDate(v){
 var s=String(v||"").trim();
 if(/^\d{8}$/.test(s))return s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8);
 return s;
}
function txKey(t){
 return [String(t.date||"").trim(),String(t.description||"").trim().toUpperCase(),Number(t.amount||0).toFixed(2)].join("|");
}

 if(found){

 }else{

function categorize(desc){
 var special=specialCategory(desc);if(special)return special;
 var d=cleanDescription(desc),matches=[];
 smartRules.forEach(function(r){if(d.indexOf(r[0])>=0)matches.push({keyword:r[0],category:r[1],include:"Yes",source:"smart"});});
 data.rules.forEach(function(r){
  if(!r||typeof r!=="object")return;
  var k=String(r.keyword||"").toUpperCase().trim();
  if(k&&d.indexOf(k)>=0)matches.push({keyword:k,category:r.category||"Needs Review",include:r.include||"Yes",source:"user"});
 });
 if(!matches.length)return{category:"Needs Review",include:"Yes",confidence:"low"};
 matches.sort(function(a,b){
  if(a.source!==b.source)return a.source==="user"?-1:1;
  return b.keyword.length-a.keyword.length;
 });
 return{category:matches[0].category,include:matches[0].include,confidence:matches[0].source==="user"?"high":"medium"};
}
function parseCsv(text){
 var lines=text.replace(/^\uFEFF/,"").split(/\r?\n/);
 var headerRow=findHeaderRow(lines);
 if(headerRow<0)return[];
 lines=lines.slice(headerRow);
 var headers=splitCsvLine(lines.shift()).map(function(x){return x.trim().toLowerCase();});
 function find(names){return headers.findIndex(function(h){return names.some(function(n){return h.indexOf(n)>=0;});});}
 var di=find(["transaction date","date posted","posting date","date"]);
 var xi=find(["description","details","merchant","payee"]);
 var ai=find(["transaction amount","amount"]);
 var debitI=find(["debit","withdrawal"]);
 var creditI=find(["credit","deposit"]);
 var typeI=find(["transaction type"]);
 var existing={};data.transactions.forEach(function(t){existing[txKey(t)]=true;});
 var imported=[];
 lines.forEach(function(line){
  if(!line.trim())return;
  var c=splitCsvLine(line);
  if(c.length<3)return;
  var desc=(c[xi]||"").trim();
  if(!desc)return;
  var amount=ai>=0?parseAmount(c[ai]):0;
  if(ai<0){
   var debit=debitI>=0?parseAmount(c[debitI]):0;
   var credit=creditI>=0?parseAmount(c[creditI]):0;
   amount=credit?credit:-Math.abs(debit);
  }
  if(typeI>=0){
   var typ=String(c[typeI]||"").trim().toUpperCase();
   if(typ==="DEBIT"&&amount>0)amount=-amount;
   if(typ==="CREDIT"&&amount<0)amount=Math.abs(amount);
  }
  var r=categorize(desc),t={date:normalizeDate(c[di]||""),description:desc,merchant:cleanDescription(desc),amount:amount,category:r.category,include:r.include,confidence:r.confidence};
  if(!existing[txKey(t)]){existing[txKey(t)]=true;imported.push(t);}
 });
 return imported;
}

function monthlyDebtPayment(d){
 var p=Number(d.payment||0)+Number(d.extraPayment||0);
 if(d.frequency==="Weekly")return p*52/12;
 if(d.frequency==="Biweekly")return p*26/12;
 if(d.frequency==="Semi-monthly")return p*24/12;
 if(d.frequency==="Annually")return p/12;
 return p;
}
function debtPayoffEstimate(d){
 var balance=Math.max(0,Number(d.balance||0));
 var payment=Math.max(0,monthlyDebtPayment(d));
 var rate=Math.max(0,Number(d.interestRate||0))/100/12;
 if(balance<=0)return{months:0,interest:0,status:"Paid off"};
 if(payment<=0)return{months:Infinity,interest:Infinity,status:"No payment"};
 if(rate===0){var m=Math.ceil(balance/payment);return{months:m,interest:0,status:"On track"};}
 if(payment<=balance*rate)return{months:Infinity,interest:Infinity,status:"Payment too low"};
 var months=Math.ceil(-Math.log(1-balance*rate/payment)/Math.log(1+rate));
 return{months:months,interest:Math.max(0,months*payment-balance),status:"On track"};
}
function debtTotals(){
 var active=(data.debts||[]).filter(function(d){return Number(d.include)!==0;});
 return active.reduce(function(a,d){
  var p=debtPayoffEstimate(d);
  a.balance+=Number(d.balance||0);a.monthly+=monthlyDebtPayment(d);
  if(isFinite(p.interest))a.interest+=p.interest;else a.problems++;

function testSpendingAmount(amount,stressType){
 var s=data.settings,originalMode=s.retirementSpendingMode,originalSpend=s.retireSpend;
 s.retirementSpendingMode=1;
 s.retireSpend=amount;
 var ok=true,shortfall=0;
 try{
  var rows=retirementPlan(s.returnRate,null,stressType||null);
  for(var i=0;i<rows.length;i++){
   if(Number(rows[i].unfunded||0)>1||rows[i].depleted){ok=false;shortfall=rows[i].age;break;}
  }
 }finally{
  s.retirementSpendingMode=originalMode;
  s.retireSpend=originalSpend;
 }
 return{ok:ok,shortfall:shortfall};
}
function maximumFundedSpending(stressType){
 var s=data.settings;
 var low=0,high=Math.max(240000,Number(s.retireSpend||0)*3);
 for(var i=0;i<24;i++){
  var mid=(low+high)/2;
  if(testSpendingAmount(mid,stressType).ok)low=mid;else high=mid;
 }
 return Math.round(low/100)*100;
}
function sustainableSpendingRange(){
 var s=data.settings;
 var current=Number(s.retireSpend||0);
 var baseMax=maximumFundedSpending(null);
 var stressedMax=Math.min(
  maximumFundedSpending("crash"),
  maximumFundedSpending("badStart"),
  maximumFundedSpending("lowReturn"),
  maximumFundedSpending("highInflation"),
  maximumFundedSpending("spendingShock")
 );
 var conservative=Math.round(stressedMax*0.9/100)*100;
 var status=current<=conservative?"comfortable":current<=stressedMax?"cautious":current<=baseMax?"aggressive":"unfunded";
 return{
  current:current,
  conservative:conservative,
  stressedMax:stressedMax,
  baseMax:baseMax,
  status:status
 };
}

function txDateObj(v){
 var s=String(v||"").trim();
 if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+"T12:00:00");
 if(/^\d{8}$/.test(s))return new Date(s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8)+"T12:00:00");

}
function monthKeyFromDate(d){

}
function monthlyHistory(count){
 var out=[],now=new Date();
 for(var i=count-1;i>=0;i--){
  var d=new Date(now.getFullYear(),now.getMonth()-i,1);
  var key=monthKeyFromDate(d),spend=0,income=0;
  data.transactions.forEach(function(t){
   var td=txDateObj(t.date);
   if(!td||monthKeyFromDate(td)!==key)return;
   var amt=Number(t.amount||0);
   if(t.include==="Yes")spend+=Math.abs(amt);
   if(t.category==="Income")income+=Math.abs(amt);
  });
  out.push({key:key,label:d.toLocaleString("en-CA",{month:"short"}),spend:spend,income:income});
 }
 return out;
}

function goalPlan(extra){
 var ordered=data.goals.slice().sort(function(a,b){return Number(a.priority||0)-Number(b.priority||0);});
 var states=ordered.map(function(g){
  var remaining=String(g.name||"").toUpperCase()==="LOC"
   ?Math.max(0,Number(g.current||0))
   :Math.max(0,Number(g.target||0)-Number(g.current||0));
  return{
   name:g.name,
   remaining:remaining,
   baseMonthly:Math.max(0,Number(g.monthly||0)),
   priority:Number(g.priority||0),
   completedMonth:remaining<=0?0:null,
   firstMonthFunding:0
  };
 });
 var rollover=Math.max(0,Number(extra||0));
 var maxMonths=600;
 for(var month=1;month<=maxMonths;month++){
  var activeIndex=states.findIndex(function(x){return x.remaining>0;});
  if(activeIndex<0)break;
  var completedThisMonth=[];
  states.forEach(function(x,i){
   if(x.remaining<=0)return;
   var funding=x.baseMonthly+(i===activeIndex?rollover:0);
   if(month===1)x.firstMonthFunding=funding;
   if(funding<=0)return;
   var paid=Math.min(x.remaining,funding);
   x.remaining-=paid;
   if(x.remaining<=0.005){
    x.remaining=0;
    x.completedMonth=month;
    completedThisMonth.push(i);
   }
  });
  completedThisMonth.forEach(function(i){
   rollover+=states[i].baseMonthly;
  });
 }
 return states.map(function(x,i){
  var original=ordered[i];
  var originalRemaining=String(original.name||"").toUpperCase()==="LOC"
   ?Math.max(0,Number(original.current||0))
   :Math.max(0,Number(original.target||0)-Number(original.current||0));
  return{
   name:x.name,
   remaining:originalRemaining,
   currentMonthly:x.baseMonthly,
   firstMonthFunding:x.firstMonthFunding,
   months:x.completedMonth
  };
 });
}

function retirementReconciliationStatus(){
 try{
  var rows=retirementPlan(data.settings.returnRate);
  var bad=rows.filter(function(r){
   var start=Number(r.startBalance||0),growth=Number(r.growth||0),income=Number(r.totalIncome||0);
   var spending=Number(r.spending||0),tax=Number(r.tax||0),future=Number(r.futureExpense||0);
   var end=Number(r.endBalance||0);
   var expected=start+growth+income-spending-tax-future;
   return Math.abs(expected-end)>5;
  });
  return{ok:bad.length===0,count:bad.length};
 }catch(err){return{ok:false,count:-1,error:String(err.message||err)};}
}

function backupCompatibilityAudit(){
 var tests=[];
 function add(ok,name,copy){tests.push({ok:!!ok,name:name,copy:copy});}
 var sampleOld={
  settings:{currentAge:52,retirementSpending:72000,wifePension:3200,wifeRetireAge:55,inflation:2.5},
  tx:[{date:"2026-01-01",desc:"Test",amount:-10,cat:"Groceries",inc:"Yes"}],
  budget:[["Groceries",1000]],goals:[]
 };
 var migratedOld=migrate(sampleOld);
 add(Number(migratedOld.settings.age)===52,"Legacy age field","Old currentAge maps to the current age setting.");
 add(Number(migratedOld.settings.retireSpend)===72000,"Legacy spending field","Old retirementSpending maps to annual retirement spending.");
 add(Number(migratedOld.settings.spousePensionMonthly)===3200,"Legacy spouse pension","Old spouse pension values migrate to the new spouse pension model.");
 add(Array.isArray(migratedOld.transactions)&&migratedOld.transactions.length===1,"Legacy transactions","Old tx arrays migrate into Transactions.");
 add(Number(migratedOld.settings.spouseTfsaBalance||0)===0,"Missing spouse TFSA defaults safely","Older backups without spouse TFSA start at zero.");
 add(Number(migratedOld.settings.userFhsaBalance||0)===0&&Number(migratedOld.settings.spouseFhsaBalance||0)===0,"Missing FHSA fields default safely","Older backups without FHSA data open with zero balances.");
 add(Number(migratedOld.settings.userPensionEnabled||0)===0,"Missing user pension defaults safely","Older backups do not invent a user pension.");
 var current=migrate(data);
 add(Number(current.dataSchemaVersion||0)===14,"Current schema version","Migrated data is tagged with schema version 6.");
 add(Array.isArray(current.netWorthHistory),"Net worth history preserved","Existing net worth snapshots remain available.");
 add(Array.isArray(current.backupHistory),"Recovery history preserved","Recovery points remain attached to the profile.");
 add(!!current.purchasePlanner&&!!current.vehiclePlanner&&!!current.travelPlanner&&!!current.healthcarePlanner,"Planner data preserved","All four planning tools survive migration.");
 var pass=tests.filter(function(x){return x.ok;}).length;
 return{tests:tests,pass:pass,total:tests.length};
}

function fullRegressionAudit(){
 var tests=[];
 function add(ok,name,copy){tests.push({ok:!!ok,name:name,copy:copy});}
 try{
  var pages=["setup","home","money","planning","transactions","goals","retirement","networth","life","review","reports","settings"];
  add(pages.every(function(id){return !!document.getElementById(id);}),"Core pages available","All primary RyanOS pages exist in the document.");
  add(typeof detailedInvestmentTotal==="function"&&typeof detailedMonthlyInvesting==="function","Investment totals available","Authoritative balance and contribution totals are callable.");
  add(Math.abs(Number(data.settings.investments||0)-detailedInvestmentTotal())<1,"Investment total synchronized","Aggregate investments match detailed accounts.");
  add(Math.abs(Number(data.settings.investing||0)-detailedMonthlyInvesting())<1,"Contribution total synchronized","Aggregate monthly investing matches detailed contributions.");
  add(typeof authoritativeDebtTotal==="function"&&typeof authoritativeDebtPayment==="function","Debt engine available","Debt balances and payments use authoritative debt sources.");
  add(typeof setupValidation==="function"&&setupValidation().items.length>0,"Setup validation available","Guided Setup produces validation results.");
  add(typeof pensionAnnualAmount==="function","Pension engine available","User and spouse pension calculations are callable.");
  var spouseAge=Number(data.settings.retireAge||0)-Number(data.settings.wifeAgeDiff||0);
  var income=retirementIncomeAtAge(Number(data.settings.retireAge||0),spouseAge);
  add(isFinite(Number(income.pension||0))&&isFinite(Number(income.cpp||0)),"Retirement income finite","Pension, CPP, OAS and support income return valid numbers.");
  var at=accountBalancesAtRetirement(Number(data.settings.returnRate||0));
  add(isFinite(Number(at.total||0))&&Number(at.total||0)>=0,"Retirement balances finite","Projected account balances are valid.");
  var rows=retirementPlan(Number(data.settings.returnRate||0));
  add(Array.isArray(rows)&&rows.length>0,"Retirement plan generated","The year-by-year retirement model returns rows.");
  add(rows.every(function(r){return Math.abs(Number(r.reconciliationDifference||0))<1;}),"Retirement reconciliation","Every retirement year reconciles within one dollar.");
  add(rows.every(function(r){return isFinite(Number(r.endBalance||0))&&isFinite(Number(r.withdrawal||0));}),"Retirement rows finite","No NaN or infinite balances appear.");
  add(typeof retirementConfidenceScore==="function"&&isFinite(Number(retirementConfidenceScore().score)),"Plan resilience score available","Plan resilience calculation returns a numeric score.");
  add(typeof sustainableSpendingRange==="function"&&isFinite(Number(sustainableSpendingRange().current)),"Sustainable spending available","Spending-range analysis returns valid values.");
  add(typeof retirementMarginAnalysis==="function"&&isFinite(Number(retirementMarginAnalysis().annualMargin)),"Retirement margin available","Margin analysis returns valid values.");
  add(typeof backupCompatibilityAudit==="function"&&backupCompatibilityAudit().pass===backupCompatibilityAudit().total,"Backup migration passes","All built-in compatibility checks pass.");
  add(Array.isArray(data.transactions)&&Array.isArray(data.budget)&&Array.isArray(data.goals),"Core data collections valid","Transactions, budget and goals are stored as arrays.");
  add(Array.isArray(data.futureExpenses)&&Array.isArray(data.netWorthHistory),"Planning history collections valid","Future expenses and net-worth history are valid arrays.");
  add(!!data.purchasePlanner&&!!data.vehiclePlanner&&!!data.travelPlanner&&!!data.healthcarePlanner,"Planning tools available","All four planning tools have data objects.");
  add(Number(data.settings.spouseTfsaBalance||0)>=0,"Spouse TFSA valid","Spouse TFSA balance is present and non-negative.");
  add(Number(data.settings.userFhsaBalance||0)>=0&&Number(data.settings.spouseFhsaBalance||0)>=0,"FHSA accounts valid","User and spouse FHSA balances are present and non-negative.");
  add(typeof pensionIncomeAudit==="function"&&pensionIncomeAudit(rows).rows.length>0,"Pension timeline audit available","Milestone income rows are generated.");
  add(typeof validateBackupObject==="function"&&validateBackupObject(data).length===0,"Current backup validates","Current saved data passes backup validation.");
  add(Number(data.dataSchemaVersion||0)===14,"Current schema version","Data is tagged with schema version 7.");
 }catch(err){
  add(false,"Regression audit execution","Audit stopped because: "+(err.message||String(err)));
 }
 var pass=tests.filter(function(x){return x.ok;}).length;
 return{tests:tests,pass:pass,total:tests.length,failed:tests.length-pass};
}
