<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#17365d">
<title>RyanOS 2.1</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--navy:#17365d;--blue:#1f4e78;--bg:#f3f6fa;--card:#fff;--text:#1f2937;--muted:#667085;--border:#d9e2ec;--good:#138a4b;--bad:#b42318;--warn:#fff2cc}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--navy);color:#fff;padding:16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:22px}header small{display:block;opacity:.8;margin-top:2px}
button,input,select,textarea{font:inherit}button{border:0;border-radius:9px;padding:9px 12px;background:var(--blue);color:#fff}
button.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}button.danger{background:#fff;color:var(--bad);border:1px solid var(--bad)}
.shell{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 72px)}
nav{background:#102a49;padding:10px;position:sticky;top:72px;height:calc(100vh - 72px);overflow:auto}
nav button{display:block;width:100%;text-align:left;background:transparent;margin:3px 0}nav button.active{background:#2d5f90}
main{padding:18px;max-width:1400px;width:100%;margin:auto}.page{display:none}.page.active{display:block}
h2{margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;box-shadow:0 2px 8px rgba(23,54,93,.06)}
.card h3{margin:0 0 8px;color:var(--muted);font-size:14px}.metric{font-size:28px;font-weight:750}.good{color:var(--good)}.bad{color:var(--bad)}
.notice{background:var(--warn);padding:12px;border-radius:10px;margin:12px 0}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:9px;border-bottom:1px solid var(--border);text-align:left;font-size:13px;vertical-align:top}th{background:#edf3f9}
input,select,textarea{border:1px solid #b8c5d1;border-radius:8px;padding:8px;background:#fff;max-width:100%}input[type=number]{width:120px}textarea{width:100%;min-height:90px}
.progress{height:11px;border-radius:99px;background:#e5e7eb;overflow:hidden}.progress span{display:block;height:100%;background:var(--good)}
.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
@media(max-width:900px){.shell{grid-template-columns:1fr}nav{position:static;height:auto;display:flex;overflow:auto;gap:4px}nav button{min-width:max-content}.grid,.grid.two,.form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.grid,.grid.two,.form-grid{grid-template-columns:1fr}main{padding:12px}.metric{font-size:24px}}

.today{background:linear-gradient(135deg,#17365d,#2d6ea6);color:white;border-radius:16px;padding:18px;margin-bottom:12px}
.today h2{margin:0 0 4px}.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:12px 0}
.kpi{background:white;border:1px solid var(--border);border-radius:12px;padding:12px}.kpi small{display:block;color:var(--muted)}.kpi strong{font-size:21px}
.ring{width:112px;height:112px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--good) calc(var(--score)*1%),#e5e7eb 0);position:relative;margin:auto}
.ring:after{content:"";position:absolute;width:82px;height:82px;border-radius:50%;background:white}.ring b{z-index:1;font-size:27px}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr 1fr}}@media(max-width:620px){.kpis{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
  <div><h1>RyanOS</h1><small>2.1 — Today Dashboard</small></div>
  <div><button class="secondary" id="exportBtn">Export</button></div>
</header>
<div class="shell">
<nav id="nav"></nav>
<main>
<section id="home" class="page active"></section>
<section id="money" class="page"></section>
<section id="transactions" class="page"></section>
<section id="goals" class="page"></section>
<section id="retirement" class="page"></section>
<section id="networth" class="page"></section>
<section id="life" class="page"></section>
<section id="settings" class="page"></section>
</main>
</div>
<script>
(function(){
"use strict";

var STORAGE_KEY="ryanos2-data";
var defaults={
 settings:{
  income1:5428.78,income2:5147.32,wcb:1352.34,investing:2600,bills:1200,chores:173,
  loc:23000,rate:5.19,months:24,investments:520000,age:52,retireAge:58,returnRate:7,
  inflation:2.5,retireSpend:72000,wifePension:3200,wifeAgeDiff:7,wifeRetireAge:55,
  userCpp65:1308.21,userCpp70:1857.66,userCppStart:70,wifeCpp60:878,wifeCpp65:1372,
  wifeCpp70:1948,wifeCppStart:65,home:650000,ns1:100000,ns2:40000,vehicles:25000,
  boat:18000,camper:15000,cash:0,ccDebt:0
 },
 budget:[
  ["Groceries",1400],["Dining",700],["Transportation",550],["Vehicle",500],
  ["Home & Garden",600],["Utilities",600],["Subscriptions",175],["Shopping & Personal",550],
  ["Pets",150],["Entertainment",200],["Alcohol",250],["Boat & Outdoor",300],
  ["Travel",500],["Medical",75],["Education",70],["Donations & Family",75],["Miscellaneous",300]
 ],
 goals:[
  {name:"Son's car",target:6000,current:0,monthly:500,priority:1},
  {name:"LOC",target:23000,current:23000,monthly:0,priority:2},
  {name:"Emergency fund",target:4000,current:0,monthly:150,priority:3},
  {name:"Garmin",target:1300,current:0,monthly:100,priority:4},
  {name:"Fence",target:6000,current:0,monthly:0,priority:5}
 ],
 life:[
  {name:"Future home build",target:500000,saved:0,year:2032,notes:"House, well, septic, shop and site work"},
  {name:"Vehicle replacement",target:45000,saved:0,year:2029,notes:"2017 Subaru replacement"},
  {name:"Caribbean trip",target:15000,saved:0,year:2028,notes:"Backpacking and sail crewing"},
  {name:"Desolation Sound",target:6000,saved:0,year:2027,notes:"Sailing trip"}
 ],
 transactions:[],
 rules:[
  {keyword:"YELLOWHEAD",category:"Income",include:"No"},{keyword:"PROVINCE",category:"Income",include:"No"},
  {keyword:"WCB",category:"Income",include:"No"},{keyword:"SAVE ON",category:"Groceries",include:"Yes"},
  {keyword:"SAFEWAY",category:"Groceries",include:"Yes"},{keyword:"TIM HORTONS",category:"Dining",include:"Yes"},
  {keyword:"MCDONALD",category:"Dining",include:"Yes"},{keyword:"SHELL",category:"Transportation",include:"Yes"},
  {keyword:"PETRO",category:"Transportation",include:"Yes"},{keyword:"HOME DEPOT",category:"Home & Garden",include:"Yes"},
  {keyword:"ROGERS",category:"Utilities",include:"Yes"},{keyword:"SHAW",category:"Utilities",include:"Yes"},
  {keyword:"NETFLIX",category:"Subscriptions",include:"Yes"},{keyword:"SPOTIFY",category:"Subscriptions",include:"Yes"},
  {keyword:"AMZN",category:"Shopping & Personal",include:"Yes"},{keyword:"LIQUOR",category:"Alcohol",include:"Yes"},
  {keyword:"WESTJET",category:"Travel",include:"Yes"},{keyword:"EXPEDIA",category:"Travel",include:"Yes"},
  {keyword:"LOC",category:"Debt",include:"No"},{keyword:"TRANSFER",category:"Transfers",include:"No"}
 ]
};

function clone(x){return JSON.parse(JSON.stringify(x));}
function migrate(raw){
 var out=clone(defaults);
 if(!raw)return out;
 if(raw.settings){
  var s=raw.settings;
  Object.keys(out.settings).forEach(function(k){
   if(s[k]!==undefined)out.settings[k]=Number(s[k]);
  });
  var map={yellowhead:"income1",province:"income2",annualBills:"bills",locBalance:"loc",locRate:"rate",locMonths:"months",currentInvestments:"investments",currentAge:"age",retirementSpending:"retireSpend",ccDebt:"ccDebt"};
  Object.keys(map).forEach(function(oldKey){if(s[oldKey]!==undefined)out.settings[map[oldKey]]=Number(s[oldKey]);});
 }
 if(Array.isArray(raw.budget))out.budget=raw.budget;
 if(Array.isArray(raw.goals))out.goals=raw.goals;
 if(Array.isArray(raw.life))out.life=raw.life;
 if(Array.isArray(raw.lifePlans))out.life=raw.lifePlans.map(function(p){return{name:p.name||"Goal",target:Number(p.target||0),saved:Number(p.saved||0),year:Number(p.targetYear||p.year||new Date().getFullYear()+1),notes:p.notes||""};});
 if(Array.isArray(raw.transactions))out.transactions=raw.transactions.map(function(t){return{date:t.date||"",description:t.description||t.desc||"",amount:Number(t.amount||0),category:t.category||t.cat||"Miscellaneous",include:t.include||t.inc||"Yes"};});
 if(Array.isArray(raw.tx))out.transactions=raw.tx.map(function(t){return{date:t.date||"",description:t.description||t.desc||"",amount:Number(t.amount||0),category:t.category||t.cat||"Miscellaneous",include:t.include||t.inc||"Yes"};});
 if(Array.isArray(raw.rules))out.rules=raw.rules.map(function(r){return{keyword:r.keyword||r.key||"",category:r.category||r.cat||"Miscellaneous",include:r.include||r.inc||"Yes"};});
 return out;
}

var data=migrate(JSON.parse(localStorage.getItem(STORAGE_KEY)||localStorage.getItem("ryanos-data")||"null"));
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));render();}
function money(n){return new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}).format(Number(n||0));}
function pmt(rate,n,pv){var r=rate/1200;return r===0?pv/n:(r*pv)/(1-Math.pow(1+r,-n));}
function totals(){
 var s=data.settings;
 var income=s.income1+s.income2+s.wcb;
 var spending=data.budget.reduce(function(a,x){return a+Number(x[1]||0);},0);
 var locPayment=pmt(s.rate,s.months,s.loc);
 var goalFunding=data.goals.filter(function(g){return g.name!=="LOC";}).reduce(function(a,g){return a+Number(g.monthly||0);},0);
 var surplus=income-spending-s.investing-s.bills-s.chores-locPayment-goalFunding;
 var assets=s.home+s.ns1+s.ns2+s.vehicles+s.boat+s.camper+s.cash+s.investments;
 var debt=s.loc+s.ccDebt;
 return{income:income,spending:spending,locPayment:locPayment,goalFunding:goalFunding,surplus:surplus,assets:assets,debt:debt,networth:assets-debt};
}
function actualSpend(){return data.transactions.filter(function(t){return t.include==="Yes";}).reduce(function(a,t){return a+Math.abs(Number(t.amount||0));},0);}
function byCategory(){var m={};data.transactions.filter(function(t){return t.include==="Yes";}).forEach(function(t){m[t.category]=(m[t.category]||0)+Math.abs(Number(t.amount||0));});return m;}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function nav(){
 var items=[["home","Home"],["money","Money"],["transactions","Transactions"],["goals","Goals & Debt"],["retirement","Retirement"],["networth","Net Worth"],["life","Life Goals"],["settings","Settings"]];
 document.getElementById("nav").innerHTML=items.map(function(x,i){return'<button data-page="'+x[0]+'" class="'+(i===0?"active":"")+'">'+x[1]+"</button>";}).join("");
 document.querySelectorAll("#nav button").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});document.querySelectorAll("#nav button").forEach(function(x){x.classList.remove("active");});document.getElementById(b.dataset.page).classList.add("active");b.classList.add("active");});});
}
function healthScore(){
 var t=totals(),score=50;
 if(t.surplus>=0)score+=20;else score-=10;
 if(data.settings.loc<23000)score+=10;
 if(actualSpend()<=t.spending)score+=10;
 if(data.settings.investments>=520000)score+=10;
 return Math.max(0,Math.min(100,score));
}
function renderHome(){
 var t=totals(),score=healthScore(),days=Math.round(Math.max(0,data.settings.retireAge-data.settings.age)*365.25);
 var goals=data.goals.slice().sort(function(a,b){return a.priority-b.priority;}).slice(0,4);
 document.getElementById("home").innerHTML=
 '<div class="today"><h2>Today Dashboard</h2><p>Your financial position and next actions.</p></div>'+
 '<div class="kpis">'+
 '<div class="kpi"><small>Net worth</small><strong>'+money(t.networth)+'</strong></div>'+
 '<div class="kpi"><small>LOC balance</small><strong>'+money(data.settings.loc)+'</strong></div>'+
 '<div class="kpi"><small>Monthly result</small><strong class="'+(t.surplus>=0?"good":"bad")+'">'+money(t.surplus)+'</strong></div>'+
 '<div class="kpi"><small>Investments</small><strong>'+money(data.settings.investments)+'</strong></div>'+
 '<div class="kpi"><small>Days to retirement</small><strong>'+days.toLocaleString()+'</strong></div></div>'+
 '<div class="grid two"><div class="card"><h3>Financial health</h3><div class="ring" style="--score:'+score+'"><b>'+score+'</b></div><p style="text-align:center">Score out of 100</p></div>'+
 '<div class="card"><h3>Priority goals</h3>'+goals.map(function(g){var p=g.name==="LOC"?(1-g.current/g.target)*100:g.current/g.target*100;return"<p><strong>"+esc(g.priority+". "+g.name)+"</strong> — "+money(g.current)+" / "+money(g.target)+'</p><div class="progress"><span style="width:'+Math.max(0,Math.min(100,p))+'%"></span></div>';}).join("")+'</div></div>'+
 '<div class="grid two" style="margin-top:12px"><div class="card"><h3>This month</h3><p>Imported spending: <strong>'+money(actualSpend())+'</strong></p><p>Budget: <strong>'+money(t.spending)+'</strong></p><p>LOC target payment: <strong>'+money(t.locPayment)+'</strong></p></div>'+
 '<div class="card"><h3>Next actions</h3><div class="notice">Import this month’s transactions.</div><p>Update LOC and goal balances.</p><p>Export a backup after your monthly review.</p></div></div>';
}
function renderMoney(){
 var t=totals(),cat=byCategory();
 document.getElementById("money").innerHTML='<h2>Money</h2><div class="grid"><div class="card"><h3>Budget</h3><div class="metric">'+money(t.spending)+'</div></div><div class="card"><h3>Actual imported</h3><div class="metric">'+money(actualSpend())+'</div></div><div class="card"><h3>LOC payment</h3><div class="metric">'+money(t.locPayment)+'</div></div><div class="card"><h3>Monthly result</h3><div class="metric '+(t.surplus>=0?"good":"bad")+'">'+money(t.surplus)+'</div></div></div>'+
 '<div class="card" style="margin-top:12px"><table><thead><tr><th>Category</th><th>Budget</th><th>Actual</th><th>Remaining</th></tr></thead><tbody>'+
 data.budget.map(function(x,i){return'<tr><td>'+esc(x[0])+'</td><td><input class="budget-input" data-i="'+i+'" type="number" value="'+x[1]+'"></td><td>'+money(cat[x[0]]||0)+'</td><td>'+money(Number(x[1])-(cat[x[0]]||0))+'</td></tr>';}).join("")+
 '</tbody></table></div>';
 document.querySelectorAll(".budget-input").forEach(function(el){el.addEventListener("change",function(){data.budget[Number(el.dataset.i)][1]=Number(el.value);save();});});
}
function categorize(desc){
 var d=(desc||"").toUpperCase(),r=data.rules.find(function(x){return d.indexOf(String(x.keyword||"").toUpperCase())>=0;});
 return r?{category:r.category,include:r.include}:{category:"Miscellaneous",include:"Yes"};
}
function parseCsv(text){
 var lines=text.trim().split(/\r?\n/);if(lines.length<2)return[];
 var headers=lines.shift().split(",").map(function(x){return x.replace(/^"|"$/g,"").trim().toLowerCase();});
 function find(names){return headers.findIndex(function(h){return names.some(function(n){return h.indexOf(n)>=0;});});}
 var di=find(["date"]),xi=find(["description","details","merchant"]),ai=find(["amount"]);
 return lines.map(function(line){
  var cols=(line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)||[]).map(function(x){return x.replace(/^"|"$/g,"").replace(/""/g,'"');});
  var desc=cols[xi]||"",amount=Number((cols[ai]||"0").replace(/[$,]/g,"")),r=categorize(desc);
  return{date:cols[di]||"",description:desc,amount:amount,category:r.category,include:r.include};
 });
}
function renderTransactions(){
 document.getElementById("transactions").innerHTML='<h2>Transactions</h2><div class="toolbar"><input type="file" id="csvFile" accept=".csv"><button id="importCsv">Import CSV</button><button class="secondary" id="applyRules">Apply rules</button><button class="danger" id="clearTx">Clear</button></div><div class="notice">Imported files stay in this browser. Review Miscellaneous items and exclusions.</div><div class="card"><table><thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Category</th><th>Include?</th><th></th></tr></thead><tbody>'+
 data.transactions.map(function(t,i){return'<tr><td>'+esc(t.date)+'</td><td>'+esc(t.description)+'</td><td>'+money(t.amount)+'</td><td><input class="tx-cat" data-i="'+i+'" value="'+esc(t.category)+'"></td><td><select class="tx-inc" data-i="'+i+'"><option '+(t.include==="Yes"?"selected":"")+'>Yes</option><option '+(t.include!=="Yes"?"selected":"")+'>No</option></select></td><td><button class="danger tx-del" data-i="'+i+'">Delete</button></td></tr>';}).join("")+
 '</tbody></table></div>';
 document.getElementById("importCsv").onclick=function(){var f=document.getElementById("csvFile").files[0];if(!f){alert("Choose a CSV file first.");return;}var r=new FileReader();r.onload=function(){data.transactions=data.transactions.concat(parseCsv(r.result));save();};r.readAsText(f);};
 document.getElementById("applyRules").onclick=function(){data.transactions.forEach(function(t){var r=categorize(t.description);t.category=r.category;t.include=r.include;});save();};
 document.getElementById("clearTx").onclick=function(){if(confirm("Clear all transactions?")){data.transactions=[];save();}};
 document.querySelectorAll(".tx-cat").forEach(function(el){el.onchange=function(){data.transactions[Number(el.dataset.i)].category=el.value;save();};});
 document.querySelectorAll(".tx-inc").forEach(function(el){el.onchange=function(){data.transactions[Number(el.dataset.i)].include=el.value;save();};});
 document.querySelectorAll(".tx-del").forEach(function(el){el.onclick=function(){data.transactions.splice(Number(el.dataset.i),1);save();};});
}
function renderGoals(){
 var t=totals(),loc=data.goals.find(function(g){return g.name==="LOC";});if(loc)loc.monthly=Math.round(t.locPayment*100)/100;
 document.getElementById("goals").innerHTML='<h2>Goals & Debt</h2><div class="toolbar"><button id="addGoal">Add goal</button></div><div class="card"><table><thead><tr><th>Priority</th><th>Goal</th><th>Target</th><th>Current</th><th>Monthly</th><th>Months</th><th></th></tr></thead><tbody>'+
 data.goals.slice().sort(function(a,b){return a.priority-b.priority;}).map(function(g){var i=data.goals.indexOf(g),m=g.monthly>0?Math.ceil(Math.max(g.target-g.current,0)/g.monthly):"—";return'<tr><td><input class="g-pri" data-i="'+i+'" type="number" value="'+g.priority+'"></td><td><input class="g-name" data-i="'+i+'" value="'+esc(g.name)+'"></td><td><input class="g-target" data-i="'+i+'" type="number" value="'+g.target+'"></td><td><input class="g-current" data-i="'+i+'" type="number" value="'+g.current+'"></td><td><input class="g-monthly" data-i="'+i+'" type="number" value="'+g.monthly+'"></td><td>'+m+'</td><td><button class="danger g-del" data-i="'+i+'">Delete</button></td></tr>';}).join("")+
 '</tbody></table></div>';
 document.getElementById("addGoal").onclick=function(){data.goals.push({name:"New goal",target:0,current:0,monthly:0,priority:data.goals.length+1});save();};
 [[".g-pri","priority",Number],[".g-name","name",String],[".g-target","target",Number],[".g-current","current",Number],[".g-monthly","monthly",Number]].forEach(function(cfg){document.querySelectorAll(cfg[0]).forEach(function(el){el.onchange=function(){data.goals[Number(el.dataset.i)][cfg[1]]=cfg[2](el.value);save();};});});
 document.querySelectorAll(".g-del").forEach(function(el){el.onclick=function(){data.goals.splice(Number(el.dataset.i),1);save();};});
}
function projection(age){
 var s=data.settings,y=age-s.age,inv=s.investments*Math.pow(1+s.returnRate/100,y)+s.investing*12*((Math.pow(1+s.returnRate/100,y)-1)/(s.returnRate/100));
 var spend=s.retireSpend*Math.pow(1+s.inflation/100,y),wifeAge=age-s.wifeAgeDiff,pension=wifeAge>=s.wifeRetireAge?s.wifePension*12:0,wcb=age<65?s.wcb*12:0;
 var cpp=age>=s.userCppStart?(s.userCppStart===70?s.userCpp70:s.userCpp65)*12:0,wcpp=wifeAge>=s.wifeCppStart?(s.wifeCppStart===60?s.wifeCpp60:s.wifeCppStart===70?s.wifeCpp70:s.wifeCpp65)*12:0;
 var income=pension+wcb+cpp+wcpp+inv*.04;return{inv:inv,spend:spend,income:income,gap:income-spend};
}
function renderRetirement(){
 var ages=[55,56,57,58,59,60,62,65];
 document.getElementById("retirement").innerHTML='<h2>Retirement</h2><div class="notice">Planning model only. Update assumptions in Settings.</div><div class="card"><table><thead><tr><th>Age</th><th>Investments</th><th>Spending</th><th>Income</th><th>Surplus / Gap</th></tr></thead><tbody>'+
 ages.map(function(a){var x=projection(a);return'<tr><td>'+a+'</td><td>'+money(x.inv)+'</td><td>'+money(x.spend)+'</td><td>'+money(x.income)+'</td><td class="'+(x.gap>=0?"good":"bad")+'">'+money(x.gap)+'</td></tr>';}).join("")+
 '</tbody></table></div>';
}
function renderNetWorth(){
 var t=totals(),s=data.settings,assets=[["Primary home",s.home],["NS property 1",s.ns1],["NS property 2",s.ns2],["Investments",s.investments],["Cash",s.cash],["Vehicles",s.vehicles],["Boat",s.boat],["Camper",s.camper]];
 document.getElementById("networth").innerHTML='<h2>Net Worth</h2><div class="grid"><div class="card"><h3>Assets</h3><div class="metric">'+money(t.assets)+'</div></div><div class="card"><h3>Debt</h3><div class="metric">'+money(t.debt)+'</div></div><div class="card"><h3>Net worth</h3><div class="metric">'+money(t.networth)+'</div></div></div><div class="card" style="margin-top:12px"><table><thead><tr><th>Asset</th><th>Value</th></tr></thead><tbody>'+assets.map(function(x){return"<tr><td>"+x[0]+"</td><td>"+money(x[1])+"</td></tr>";}).join("")+"</tbody></table></div>";
}
function renderLife(){
 document.getElementById("life").innerHTML='<h2>Life Goals</h2><div class="toolbar"><button id="addLife">Add life goal</button></div><div class="card"><table><thead><tr><th>Goal</th><th>Target</th><th>Saved</th><th>Year</th><th>Progress</th><th>Notes</th><th></th></tr></thead><tbody>'+
 data.life.map(function(p,i){var pr=p.target?Math.min(100,p.saved/p.target*100):0;return'<tr><td><input class="l-name" data-i="'+i+'" value="'+esc(p.name)+'"></td><td><input class="l-target" data-i="'+i+'" type="number" value="'+p.target+'"></td><td><input class="l-saved" data-i="'+i+'" type="number" value="'+p.saved+'"></td><td><input class="l-year" data-i="'+i+'" type="number" value="'+p.year+'"></td><td>'+pr.toFixed(1)+'%</td><td><input class="l-notes" data-i="'+i+'" value="'+esc(p.notes)+'"></td><td><button class="danger l-del" data-i="'+i+'">Delete</button></td></tr>';}).join("")+
 '</tbody></table></div>';
 document.getElementById("addLife").onclick=function(){data.life.push({name:"New life goal",target:0,saved:0,year:new Date().getFullYear()+1,notes:""});save();};
 [[".l-name","name",String],[".l-target","target",Number],[".l-saved","saved",Number],[".l-year","year",Number],[".l-notes","notes",String]].forEach(function(cfg){document.querySelectorAll(cfg[0]).forEach(function(el){el.onchange=function(){data.life[Number(el.dataset.i)][cfg[1]]=cfg[2](el.value);save();};});});
 document.querySelectorAll(".l-del").forEach(function(el){el.onclick=function(){data.life.splice(Number(el.dataset.i),1);save();};});
}

 var s=data.settings,fields=[["income1","Yellowhead monthly income"],["income2","Province monthly income"],["wcb","WorkSafeBC monthly income"],["investing","Retirement investing"],["bills","Annual-bills reserve"],["chores","Son's chores"],["loc","LOC balance"],["rate","LOC rate (%)"],["months","LOC months"],["investments","Current investments"],["age","Current age"],["retireAge","Retirement age"],["returnRate","Expected return (%)"],["inflation","Inflation (%)"],["retireSpend","Annual retirement spending"],["wifePension","Wife monthly pension"],["wifeAgeDiff","Wife age difference"],["wifeRetireAge","Wife retirement age"],["userCpp65","User CPP at 65"],["userCpp70","User CPP at 70"],["userCppStart","User CPP start age"],["wifeCpp60","Wife CPP at 60"],["wifeCpp65","Wife CPP at 65"],["wifeCpp70","Wife CPP at 70"],["wifeCppStart","Wife CPP start age"],["home","Home value"],["ns1","NS property 1"],["ns2","NS property 2"],["vehicles","Vehicle value"],["boat","Boat value"],["camper","Camper value"],["cash","Cash"],["ccDebt","Credit-card debt"]];

 document.querySelectorAll(".setting-input").forEach(function(el){el.onchange=function(){data.settings[el.dataset.k]=Number(el.value);save();};});
 document.getElementById("importBackup").onclick=function(){var f=document.getElementById("backupFile").files[0];if(!f){alert("Choose a JSON backup.");return;}var r=new FileReader();r.onload=function(){data=migrate(JSON.parse(r.result));save();};r.readAsText(f);};
 document.getElementById("reset").onclick=function(){if(confirm("Reset all data?")){data=clone(defaults);save();}};

nav();render();
