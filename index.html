<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#17365d">
<title>RyanOS 2.6.8</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--navy:#17365d;--blue:#1f4e78;--bg:#f3f6fa;--card:#fff;--text:#1f2937;--muted:#667085;--border:#d9e2ec;--good:#138a4b;--bad:#b42318;--warn:#fff2cc}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--navy);color:#fff;padding:16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:22px}header small{display:block;opacity:.8;margin-top:2px}
button,input,select,textarea{font:inherit}button{border:0;border-radius:9px;padding:9px 12px;background:var(--blue);color:#fff}
button.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}button.danger{background:#fff;color:var(--bad);border:1px solid var(--bad)}
.shell{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 72px)}
nav{background:#102a49;padding:10px;position:sticky;top:72px;height:calc(100vh - 72px);overflow:auto}
nav button{display:block;width:100%;text-align:left;background:transparent;margin:3px 0}nav button.active{background:#2d5f90}
main{padding:18px;max-width:1400px;width:100%;margin:auto}.page{display:none}.page.active{display:block}
h2{margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;box-shadow:0 2px 8px rgba(23,54,93,.06)}
.card h3{margin:0 0 8px;color:var(--muted);font-size:14px}.metric{font-size:28px;font-weight:750}.good{color:var(--good)}.bad{color:var(--bad)}
.notice{background:var(--warn);padding:12px;border-radius:10px;margin:12px 0}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:9px;border-bottom:1px solid var(--border);text-align:left;font-size:13px;vertical-align:top}th{background:#edf3f9}
input,select,textarea{border:1px solid #b8c5d1;border-radius:8px;padding:8px;background:#fff;max-width:100%}input[type=number]{width:120px}textarea{width:100%;min-height:90px}
.progress{height:11px;border-radius:99px;background:#e5e7eb;overflow:hidden}.progress span{display:block;height:100%;background:var(--good)}
.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
@media(max-width:900px){.shell{grid-template-columns:1fr}nav{position:static;height:auto;display:flex;overflow:auto;gap:4px}nav button{min-width:max-content}.grid,.grid.two,.form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.grid,.grid.two,.form-grid{grid-template-columns:1fr}main{padding:12px}.metric{font-size:24px}}

.today{background:linear-gradient(135deg,#17365d,#2d6ea6);color:white;border-radius:16px;padding:18px;margin-bottom:12px}
.today h2{margin:0 0 4px}.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:12px 0}
.kpi{background:white;border:1px solid var(--border);border-radius:12px;padding:12px}.kpi small{display:block;color:var(--muted)}.kpi strong{font-size:21px}
.ring{width:112px;height:112px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--good) calc(var(--score)*1%),#e5e7eb 0);position:relative;margin:auto}
.ring:after{content:"";position:absolute;width:82px;height:82px;border-radius:50%;background:white}.ring b{z-index:1;font-size:27px}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr 1fr}}@media(max-width:620px){.kpis{grid-template-columns:1fr 1fr}}

.report-bars{display:flex;align-items:flex-end;gap:10px;height:220px;padding:18px 8px 0;border-bottom:1px solid var(--border)}
.report-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:34px}
.report-bar{width:100%;max-width:54px;background:#2d6ea6;border-radius:6px 6px 0 0;min-height:2px}
.report-col span{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;word-break:break-word}
.alert-row{background:#fff3f2}.optimizer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.range-wrap{display:grid;grid-template-columns:1fr 100px;gap:10px;align-items:center}
input[type=range]{width:100%}
@media(max-width:700px){.optimizer-grid{grid-template-columns:1fr}.report-bars{overflow-x:auto;justify-content:flex-start}.report-col{min-width:52px}}

</style>
</head>
<body>
<header>
  <div><h1>RyanOS</h1><small>2.6.8 — Linked Annual Spending</small></div>

</div>
<script>
(function(){
"use strict";

var STORAGE_KEY="ryanos2-data";
var defaults={
 settings:{
  income1:5428.78,income2:5147.32,wcb:1352.34,investing:2600,bills:1200,chores:173,
  loc:23000,rate:5.19,months:24,investments:520000,age:52,retireAge:58,returnRate:7,
  inflation:2.5,retireSpend:72000,wifePension:3200,wifeAgeDiff:7,wifeRetireAge:55,wifeEmploymentAnnual:110000,wifeWorkUntilUserAge:62,wifeEmploymentGrowth:0,userOasMonthly:751.97,userOasStart:65,wifeOasMonthly:751.97,wifeOasStart:65,spendingLookbackMonths:12,irregularAnnualAllowance:9000,retirementScenarioUserAge:58,retirementScenarioWifeAge:51,
  userCpp65:1308.21,userCpp70:1857.66,userCppStart:70,wifeCpp60:878,wifeCpp65:1372,
  wifeCpp70:1948,wifeCppStart:65,home:650000,ns1:100000,ns2:40000,vehicles:25000,
  boat:18000,camper:15000,cash:0,ccDebt:0
 },
 budget:[
  ["Groceries",1400],["Dining",700],["Transportation",550],["Vehicle",500],
  ["Home & Garden",600],["Utilities",600],["Subscriptions",175],["Shopping & Personal",550],
  ["Pets",150],["Entertainment",200],["Alcohol",250],["Boat & Outdoor",300],
  ["Travel",500],["Medical",75],["Education",70],["Donations & Family",75],["Miscellaneous",300]
 ],
 goals:[
  {name:"Son's car",target:6000,current:0,monthly:500,priority:1},
  {name:"LOC",target:23000,current:23000,monthly:0,priority:2},
  {name:"Emergency fund",target:4000,current:0,monthly:150,priority:3},
  {name:"Garmin",target:1300,current:0,monthly:100,priority:4},
  {name:"Fence",target:6000,current:0,monthly:0,priority:5}
 ],
 life:[

  {name:"Vehicle replacement",target:45000,saved:0,year:2029,notes:"2017 Subaru replacement"},
  {name:"Caribbean trip",target:15000,saved:0,year:2028,notes:"Backpacking and sail crewing"},
  {name:"Desolation Sound",target:6000,saved:0,year:2027,notes:"Sailing trip"}
 ],
 transactions:[],
 rules:[
  {keyword:"YELLOWHEAD",category:"Income",include:"No"},{keyword:"PROVINCE",category:"Income",include:"No"},
  {keyword:"WCB",category:"Income",include:"No"},{keyword:"SAVE ON",category:"Groceries",include:"Yes"},
  {keyword:"SAFEWAY",category:"Groceries",include:"Yes"},{keyword:"TIM HORTONS",category:"Dining",include:"Yes"},
  {keyword:"MCDONALD",category:"Dining",include:"Yes"},{keyword:"SHELL",category:"Transportation",include:"Yes"},
  {keyword:"PETRO",category:"Transportation",include:"Yes"},{keyword:"HOME DEPOT",category:"Home & Garden",include:"Yes"},
  {keyword:"ROGERS",category:"Utilities",include:"Yes"},{keyword:"SHAW",category:"Utilities",include:"Yes"},
  {keyword:"NETFLIX",category:"Subscriptions",include:"Yes"},{keyword:"SPOTIFY",category:"Subscriptions",include:"Yes"},
  {keyword:"AMZN",category:"Shopping & Personal",include:"Yes"},{keyword:"LIQUOR",category:"Alcohol",include:"Yes"},
  {keyword:"WESTJET",category:"Travel",include:"Yes"},{keyword:"EXPEDIA",category:"Travel",include:"Yes"},
  {keyword:"LOC",category:"Debt",include:"No"},{keyword:"TRANSFER",category:"Transfers",include:"No"}
 ]
};

function clone(x){return JSON.parse(JSON.stringify(x));}
function migrate(raw){
 var out=clone(defaults);
 if(!raw)return out;
 if(raw.settings){
  var s=raw.settings;
  Object.keys(out.settings).forEach(function(k){
   if(s[k]!==undefined)out.settings[k]=Number(s[k]);
  });
  var map={yellowhead:"income1",province:"income2",annualBills:"bills",locBalance:"loc",locRate:"rate",locMonths:"months",currentInvestments:"investments",currentAge:"age",retirementSpending:"retireSpend",ccDebt:"ccDebt"};
  Object.keys(map).forEach(function(oldKey){if(s[oldKey]!==undefined)out.settings[map[oldKey]]=Number(s[oldKey]);});
 }
 if(Array.isArray(raw.budget))out.budget=raw.budget;
 if(Array.isArray(raw.goals))out.goals=raw.goals;
 if(Array.isArray(raw.life))out.life=raw.life;
 if(Array.isArray(raw.lifePlans))out.life=raw.lifePlans.map(function(p){return{name:p.name||"Goal",target:Number(p.target||0),saved:Number(p.saved||0),year:Number(p.targetYear||p.year||new Date().getFullYear()+1),notes:p.notes||""};});
 if(Array.isArray(raw.transactions))out.transactions=raw.transactions.map(function(t){return{date:t.date||"",description:t.description||t.desc||"",amount:Number(t.amount||0),category:t.category||t.cat||"Miscellaneous",include:t.include||t.inc||"Yes"};});
 if(Array.isArray(raw.tx))out.transactions=raw.tx.map(function(t){return{date:t.date||"",description:t.description||t.desc||"",amount:Number(t.amount||0),category:t.category||t.cat||"Miscellaneous",include:t.include||t.inc||"Yes"};});
 if(Array.isArray(raw.rules))out.rules=raw.rules.map(function(r){return{keyword:r.keyword||r.key||"",category:r.category||r.cat||"Miscellaneous",include:r.include||r.inc||"Yes"};});
 return out;
}

var data=migrate(JSON.parse(localStorage.getItem(STORAGE_KEY)||localStorage.getItem("ryanos-data")||"null"));
if(!data.review)data.review={month:new Date().toISOString().slice(0,7),notes:"",lastBackup:""};
if(!Array.isArray(data.netWorthHistory))data.netWorthHistory=[];
if(data.optimizerExtra===undefined)data.optimizerExtra=0;
if(!data.reportMonth)data.reportMonth=data.review.month||new Date().toISOString().slice(0,7);
if(!data.review||typeof data.review!=="object")data.review={month:new Date().toISOString().slice(0,7),notes:"",lastBackup:""};
if(!data.review.month)data.review.month=new Date().toISOString().slice(0,7);
if(!Array.isArray(data.transactions))data.transactions=[];
data.transactions=data.transactions.filter(function(t){return t&&typeof t==="object";}).map(function(t){
 return{
  date:t.date||"",
  description:t.description||t.desc||"",
  merchant:t.merchant||"",
  amount:Number(t.amount||0),
  category:t.category||t.cat||"Needs Review",
  include:t.include||t.inc||"Yes",
  confidence:t.confidence||""
 };
});
if(!Array.isArray(data.rules))data.rules=[];
data.rules=data.rules.filter(function(r){return r&&typeof r==="object";}).map(function(r){
 return{
  keyword:String(r.keyword||r.key||""),
  category:String(r.category||r.cat||"Needs Review"),
  include:String(r.include||r.inc||"Yes")
 };
});
if(!Array.isArray(data.budget))data.budget=clone(defaults.budget);
if(!Array.isArray(data.goals))data.goals=clone(defaults.goals);
[
 ["wifeEmploymentAnnual",110000],
 ["wifeWorkUntilUserAge",62],
 ["wifeEmploymentGrowth",0],
 ["userOasMonthly",751.97],
 ["userOasStart",65],
 ["wifeOasMonthly",751.97],
 ["wifeOasStart",65],
 ["spendingLookbackMonths",12],
 ["irregularAnnualAllowance",9000],
 ["retirementScenarioUserAge",58],
 ["retirementScenarioWifeAge",51]
].forEach(function(x){
 if(data.settings[x[0]]===undefined||!isFinite(Number(data.settings[x[0]])))data.settings[x[0]]=x[1];
});

var locGoalInit=data.goals.find(function(g){return String(g&&g.name||"").toUpperCase()==="LOC";});
if(locGoalInit&&(!isFinite(Number(locGoalInit.monthly))||Number(locGoalInit.monthly)<=0)){
 locGoalInit.monthly=Math.round(pmt(data.settings.rate,data.settings.months,data.settings.loc)*100)/100;
}

if(!Array.isArray(data.life))data.life=clone(defaults.life);



function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));render();}
function money(n){return new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}).format(Number(n||0));}
function pmt(rate,n,pv){var r=rate/1200;return r===0?pv/n:(r*pv)/(1-Math.pow(1+r,-n));}
function totals(){
 var s=data.settings;
 var income=s.income1+s.income2+s.wcb;
 var spending=data.budget.reduce(function(a,x){return a+Number(x[1]||0);},0);
 var locPayment=pmt(s.rate,s.months,s.loc);
 var goalFunding=data.goals.filter(function(g){return g.name!=="LOC";}).reduce(function(a,g){return a+Number(g.monthly||0);},0);
 var surplus=income-spending-s.investing-s.bills-s.chores-locPayment-goalFunding;
 var assets=s.home+s.ns1+s.ns2+s.vehicles+s.boat+s.camper+s.cash+s.investments;
 var debt=s.loc+s.ccDebt;
 return{income:income,spending:spending,locPayment:locPayment,goalFunding:goalFunding,surplus:surplus,assets:assets,debt:debt,networth:assets-debt};
}
function actualSpend(){return data.transactions.filter(function(t){return t.include==="Yes";}).reduce(function(a,t){return a+Math.abs(Number(t.amount||0));},0);}
function byCategory(){var m={};data.transactions.filter(function(t){return t.include==="Yes";}).forEach(function(t){m[t.category]=(m[t.category]||0)+Math.abs(Number(t.amount||0));});return m;}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function nav(){
 var items=[["home","Home"],["money","Money"],["transactions","Transactions"],["goals","Goals & Debt"],["retirement","Retirement"],["networth","Net Worth"],["life","Life Goals"],["review","Monthly Review"],["reports","Reports & Optimizer"],["settings","Settings"]];
 document.getElementById("nav").innerHTML=items.map(function(x,i){return'<button data-page="'+x[0]+'" class="'+(i===0?"active":"")+'">'+x[1]+"</button>";}).join("");
 document.querySelectorAll("#nav button").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});document.querySelectorAll("#nav button").forEach(function(x){x.classList.remove("active");});document.getElementById(b.dataset.page).classList.add("active");b.classList.add("active");});});
}
function financialHealth(){
 var t=totals();
 var month=data.reportMonth||data.review.month||new Date().toISOString().slice(0,7);
 var monthTx=monthTransactions(month);
 var monthSpend=monthTx.filter(function(x){return x.include==="Yes";}).reduce(function(a,x){return a+Math.abs(Number(x.amount||0));},0);
 var budgetPoints;
 var budgetNote;
 if(monthTx.length===0){
  budgetPoints=15;
  budgetNote="No transactions imported for "+month+"; neutral score used.";
 }else{
  var ratio=t.spending>0?monthSpend/t.spending:1;
  budgetPoints=ratio<=0.90?25:ratio<=1?25-(ratio-0.90)*100:Math.max(0,15-(ratio-1)*75);
  budgetNote=money(monthSpend)+" spent against "+money(t.spending)+" monthly budget.";
 }
 budgetPoints=Math.round(Math.max(0,Math.min(25,budgetPoints)));

 var cashRatio=t.income>0?t.surplus/t.income:0;
 var cashPoints=cashRatio>=0.10?20:cashRatio>=0?15:cashRatio>=-0.05?8:0;
 var cashNote="Planned monthly result: "+money(t.surplus)+".";

 var locGoal=data.goals.find(function(g){return String(g.name||"").toUpperCase()==="LOC";});
 var locStart=Math.max(Number(locGoal&&locGoal.target||0),23000,Number(data.settings.loc||0));
 var debtProgress=locStart>0?(locStart-Number(data.settings.loc||0))/locStart:1;
 var debtPoints=Math.round(15*Math.max(0,Math.min(1,debtProgress)));
 var debtNote="LOC balance: "+money(data.settings.loc)+" from a "+money(locStart)+" starting balance.";

 var emergency=data.goals.find(function(g){return String(g.name||"").toLowerCase().indexOf("emergency")>=0;});
 var emergencyProgress=emergency&&Number(emergency.target)>0?Number(emergency.current||0)/Number(emergency.target):0;
 var emergencyPoints=Math.round(15*Math.max(0,Math.min(1,emergencyProgress)));
 var emergencyNote=emergency?money(emergency.current)+" saved toward "+money(emergency.target)+".":"No emergency-fund goal found.";

 var incomplete=data.goals.filter(function(g){return g.name!=="LOC"&&Number(g.current||0)<Number(g.target||0);});
 var funded=incomplete.filter(function(g){return Number(g.monthly||0)>0;}).length;
 var goalPoints=incomplete.length?Math.round(10*funded/incomplete.length):10;
 var goalNote=funded+" of "+incomplete.length+" incomplete non-LOC goals have monthly funding.";

 var nwPoints=5,nwNote="Add two net-worth snapshots to measure the trend.";
 if(data.netWorthHistory.length>=2){
  var sorted=data.netWorthHistory.slice().sort(function(a,b){return String(a.month).localeCompare(String(b.month));});
  var prev=Number(sorted[sorted.length-2].value||0),latest=Number(sorted[sorted.length-1].value||0);
  var change=latest-prev;
  nwPoints=change>0?10:change===0?6:0;
  nwNote="Latest net-worth change: "+money(change)+".";
 }

 var retire=projection(data.settings.retireAge);
 var wifeAge=data.settings.retireAge-data.settings.wifeAgeDiff;
 var guaranteed=(wifeAge>=data.settings.wifeRetireAge?data.settings.wifePension*12:0);
 if(data.settings.retireAge>=data.settings.userCppStart)guaranteed+=(data.settings.userCppStart===70?data.settings.userCpp70:data.settings.userCpp65)*12;
 var capitalTarget=Math.max(0,(retire.spend-guaranteed)*25);
 var retirementRatio=capitalTarget>0?retire.inv/capitalTarget:1;
 var retirementPoints=Math.round(5*Math.max(0,Math.min(1,retirementRatio)));
 var retirementNote="Projected investments at "+data.settings.retireAge+": "+money(retire.inv)+"; rough capital target: "+money(capitalTarget)+".";

 var parts=[
  {name:"Monthly budget",points:budgetPoints,max:25,note:budgetNote},
  {name:"Cash-flow plan",points:cashPoints,max:20,note:cashNote},
  {name:"LOC reduction",points:debtPoints,max:15,note:debtNote},
  {name:"Emergency fund",points:emergencyPoints,max:15,note:emergencyNote},
  {name:"Goal funding",points:goalPoints,max:10,note:goalNote},
  {name:"Net-worth trend",points:nwPoints,max:10,note:nwNote},
  {name:"Retirement progress",points:retirementPoints,max:5,note:retirementNote}
 ];
 var total=parts.reduce(function(a,x){return a+x.points;},0);
 return{total:Math.max(0,Math.min(100,total)),parts:parts,month:month};
}
function healthScore(){return financialHealth().total;}
function renderHome(){
 var t=totals(),health=financialHealth(),score=health.total,days=Math.round(Math.max(0,data.settings.retireAge-data.settings.age)*365.25);
 var goals=data.goals.slice().sort(function(a,b){return a.priority-b.priority;}).slice(0,4);
 document.getElementById("home").innerHTML=
 '<div class="today"><h2>Today Dashboard</h2><p>Your financial position and next actions.</p></div>'+
 '<div class="kpis">'+
 '<div class="kpi"><small>Net worth</small><strong>'+money(t.networth)+'</strong></div>'+
 '<div class="kpi"><small>LOC balance</small><strong>'+money(data.settings.loc)+'</strong></div>'+
 '<div class="kpi"><small>Monthly result</small><strong class="'+(t.surplus>=0?"good":"bad")+'">'+money(t.surplus)+'</strong></div>'+
 '<div class="kpi"><small>Investments</small><strong>'+money(data.settings.investments)+'</strong></div>'+
 '<div class="kpi"><small>Days to retirement</small><strong>'+days.toLocaleString()+'</strong></div></div>'+
 '<div class="grid two"><div class="card"><h3>Financial health</h3><div class="ring" style="--score:'+score+'"><b>'+score+'</b></div><p style="text-align:center">Score out of 100</p></div>'+
 '<div class="card"><h3>Priority goals</h3>'+goals.map(function(g){var p=g.name==="LOC"?(1-g.current/g.target)*100:g.current/g.target*100;return"<p><strong>"+esc(g.priority+". "+g.name)+"</strong> — "+money(g.current)+" / "+money(g.target)+'</p><div class="progress"><span style="width:'+Math.max(0,Math.min(100,p))+'%"></span></div>';}).join("")+'</div></div>'+
 +'<div class="card" style="margin-top:12px"><h3>How the score is calculated — '+esc(health.month)+'</h3><table><thead><tr><th>Measure</th><th>Points</th><th>What it measures</th></tr></thead><tbody>'+
 health.parts.map(function(x){return'<tr><td>'+esc(x.name)+'</td><td><strong>'+x.points+' / '+x.max+'</strong></td><td>'+esc(x.note)+'</td></tr>';}).join("")+
 '</tbody></table><div class="notice">The score is a planning indicator, not a credit score or financial-advice rating. A missing month of transaction data receives a neutral budget score rather than a perfect score.</div></div>' + '<div class="grid two" style="margin-top:12px"><div class="card"><h3>This month</h3><p>Imported spending: <strong>'+money(actualSpend())+'</strong></p><p>Budget: <strong>'+money(t.spending)+'</strong></p><p>LOC target payment: <strong>'+money(t.locPayment)+'</strong></p></div>'+
 '<div class="card"><h3>Next actions</h3><div class="notice">Import this month’s transactions.</div><p>Update LOC and goal balances.</p><p>Export a backup after your monthly review.</p></div></div>';
}
function renderMoney(){
 var month=data.reportMonth||data.review.month||new Date().toISOString().slice(0,7);
 var t=totals(),cat=byCategoryForMonth(month),estimate=spendingEstimate();
 var monthTx=monthTransactions(month);

function cleanDescription(desc){

 return null;

function splitCsvLine(line){
 var out=[],cur="",quoted=false;
 for(var i=0;i<line.length;i++){
  var ch=line[i];
  if(ch==='"'){
   if(quoted&&line[i+1]==='"'){cur+='"';i++;}
   else quoted=!quoted;
  }else if(ch===","&&!quoted){out.push(cur);cur="";}
  else cur+=ch;
 }
 out.push(cur);
 return out;
}
function findHeaderRow(lines){
 for(var i=0;i<Math.min(lines.length,25);i++){
  var cols=splitCsvLine(lines[i]).map(function(x){return String(x).trim().toLowerCase();});
  var hasDate=cols.some(function(h){return h.indexOf("date")>=0;});
  var hasAmount=cols.some(function(h){return h.indexOf("amount")>=0||h.indexOf("debit")>=0||h.indexOf("credit")>=0;});
  var hasDesc=cols.some(function(h){return h.indexOf("description")>=0||h.indexOf("merchant")>=0||h.indexOf("details")>=0||h.indexOf("payee")>=0;});
  if(hasDate&&hasAmount&&hasDesc)return i;
 }
 return -1;
}
function parseAmount(v){
 var s=String(v||"").replace(/[$,\s]/g,"");
 if(s.indexOf("(")>=0&&s.indexOf(")")>=0)s="-"+s.replace(/[()]/g,"");
 var n=Number(s);
 return isNaN(n)?0:n;
}
function normalizeDate(v){
 var s=String(v||"").trim();
 if(/^\d{8}$/.test(s))return s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8);
 return s;
}

function categorize(desc){
 var special=specialCategory(desc);if(special)return special;
 var d=cleanDescription(desc),matches=[];
 smartRules.forEach(function(r){if(d.indexOf(r[0])>=0)matches.push({keyword:r[0],category:r[1],include:"Yes",source:"smart"});});
 data.rules.forEach(function(r){
  if(!r||typeof r!=="object")return;
  var k=String(r.keyword||"").toUpperCase().trim();
  if(k&&d.indexOf(k)>=0)matches.push({keyword:k,category:r.category||"Needs Review",include:r.include||"Yes",source:"user"});
 });
 if(!matches.length)return{category:"Needs Review",include:"Yes",confidence:"low"};
 matches.sort(function(a,b){
  if(a.source!==b.source)return a.source==="user"?-1:1;
  return b.keyword.length-a.keyword.length;
 });
 return{category:matches[0].category,include:matches[0].include,confidence:matches[0].source==="user"?"high":"medium"};
}
function parseCsv(text){
 var lines=text.replace(/^\uFEFF/,"").split(/\r?\n/);
 var headerRow=findHeaderRow(lines);
 if(headerRow<0)return[];
 lines=lines.slice(headerRow);
 var headers=splitCsvLine(lines.shift()).map(function(x){return x.trim().toLowerCase();});
 function find(names){return headers.findIndex(function(h){return names.some(function(n){return h.indexOf(n)>=0;});});}
 var di=find(["transaction date","date posted","posting date","date"]);
 var xi=find(["description","details","merchant","payee"]);
 var ai=find(["transaction amount","amount"]);
 var debitI=find(["debit","withdrawal"]);
 var creditI=find(["credit","deposit"]);
 var typeI=find(["transaction type"]);
 var existing={};data.transactions.forEach(function(t){existing[txKey(t)]=true;});
 var imported=[];
 lines.forEach(function(line){
  if(!line.trim())return;
  var c=splitCsvLine(line);
  if(c.length<3)return;
  var desc=(c[xi]||"").trim();
  if(!desc)return;
  var amount=ai>=0?parseAmount(c[ai]):0;
  if(ai<0){
   var debit=debitI>=0?parseAmount(c[debitI]):0;
   var credit=creditI>=0?parseAmount(c[creditI]):0;
   amount=credit?credit:-Math.abs(debit);
  }
  if(typeI>=0){
   var typ=String(c[typeI]||"").trim().toUpperCase();
   if(typ==="DEBIT"&&amount>0)amount=-amount;
   if(typ==="CREDIT"&&amount<0)amount=Math.abs(amount);
  }
  var r=categorize(desc),t={date:normalizeDate(c[di]||""),description:desc,merchant:cleanDescription(desc),amount:amount,category:r.category,include:r.include,confidence:r.confidence};
  if(!existing[txKey(t)]){existing[txKey(t)]=true;imported.push(t);}
 });
 return imported;
}

function txDateObj(v){
 var s=String(v||"").trim();
 if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+"T12:00:00");
 if(/^\d{8}$/.test(s))return new Date(s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8)+"T12:00:00");
 var d=new Date(s);
 return isNaN(d.getTime())?null:d;
}
function monthKeyFromDate(d){
 return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}
function monthlyHistory(count){
 var out=[],now=new Date();
 for(var i=count-1;i>=0;i--){
  var d=new Date(now.getFullYear(),now.getMonth()-i,1);
  var key=monthKeyFromDate(d),spend=0,income=0;
  data.transactions.forEach(function(t){
   var td=txDateObj(t.date);
   if(!td||monthKeyFromDate(td)!==key)return;
   var amt=Number(t.amount||0);
   if(t.include==="Yes")spend+=Math.abs(amt);
   if(t.category==="Income")income+=Math.abs(amt);
  });
  out.push({key:key,label:d.toLocaleString("en-CA",{month:"short"}),spend:spend,income:income});
 }
 return out;
}

function merchantReport(month){
 var m={};
 monthTransactions(month).filter(function(t){return t.include==="Yes";}).forEach(function(t){
  var k=(t.merchant||t.description||"Unknown").trim();
  if(!m[k])m[k]=0;
  m[k]+=Math.abs(Number(t.amount||0));
 });

 monthTransactions(month).filter(function(t){return t.include==="Yes";}).forEach(function(t){

 });

function goalPlan(extra){
 var ordered=data.goals.slice().sort(function(a,b){return Number(a.priority||0)-Number(b.priority||0);});
 var states=ordered.map(function(g){
  var remaining=String(g.name||"").toUpperCase()==="LOC"
   ?Math.max(0,Number(g.current||0))
   :Math.max(0,Number(g.target||0)-Number(g.current||0));
  return{
   name:g.name,
   remaining:remaining,
   baseMonthly:Math.max(0,Number(g.monthly||0)),
   priority:Number(g.priority||0),
   completedMonth:remaining<=0?0:null,
   firstMonthFunding:0
  };
 });
 var rollover=Math.max(0,Number(extra||0));
 var maxMonths=600;
 for(var month=1;month<=maxMonths;month++){
  var activeIndex=states.findIndex(function(x){return x.remaining>0;});
  if(activeIndex<0)break;
  var completedThisMonth=[];
  states.forEach(function(x,i){
   if(x.remaining<=0)return;
   var funding=x.baseMonthly+(i===activeIndex?rollover:0);
   if(month===1)x.firstMonthFunding=funding;
   if(funding<=0)return;
   var paid=Math.min(x.remaining,funding);
   x.remaining-=paid;
   if(x.remaining<=0.005){
    x.remaining=0;
    x.completedMonth=month;
    completedThisMonth.push(i);
   }
  });
  completedThisMonth.forEach(function(i){
   rollover+=states[i].baseMonthly;
  });
 }
 return states.map(function(x,i){
  var original=ordered[i];
  var originalRemaining=String(original.name||"").toUpperCase()==="LOC"
   ?Math.max(0,Number(original.current||0))
   :Math.max(0,Number(original.target||0)-Number(original.current||0));
  return{
   name:x.name,
   remaining:originalRemaining,
   currentMonthly:x.baseMonthly,
   firstMonthFunding:x.firstMonthFunding,
   months:x.completedMonth
  };
 });
}
