<style>
:root{--navy:#17365d;--blue:#1f4e78;--bg:#f3f6fa;--card:#fff;--text:#1f2937;--muted:#667085;--border:#d9e2ec;--good:#138a4b;--bad:#b42318;--warn:#fff2cc}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--navy);color:#fff;padding:16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:22px}header small{display:block;opacity:.8;margin-top:2px}
button,input,select,textarea{font:inherit}button{border:0;border-radius:9px;padding:9px 12px;background:var(--blue);color:#fff}
button.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}button.danger{background:#fff;color:var(--bad);border:1px solid var(--bad)}
.shell{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 72px)}
nav{background:#102a49;padding:10px;position:sticky;top:72px;height:calc(100vh - 72px);overflow:auto}
nav button{display:block;width:100%;text-align:left;background:transparent;margin:3px 0}nav button.active{background:#2d5f90}
main{padding:18px;max-width:1400px;width:100%;margin:auto}.page{display:none}.page.active{display:block}
h2{margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;box-shadow:0 2px 8px rgba(23,54,93,.06)}
.card h3{margin:0 0 8px;color:var(--muted);font-size:14px}.metric{font-size:28px;font-weight:750}.good{color:var(--good)}.bad{color:var(--bad)}
.notice{background:var(--warn);padding:12px;border-radius:10px;margin:12px 0}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:9px;border-bottom:1px solid var(--border);text-align:left;font-size:13px;vertical-align:top}th{background:#edf3f9}
input,select,textarea{border:1px solid #b8c5d1;border-radius:8px;padding:8px;background:#fff;max-width:100%}input[type=number]{width:120px}textarea{width:100%;min-height:90px}
.progress{height:11px;border-radius:99px;background:#e5e7eb;overflow:hidden}.progress span{display:block;height:100%;background:var(--good)}
.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
@media(max-width:900px){.shell{grid-template-columns:1fr}nav{position:static;height:auto;display:flex;overflow:auto;gap:4px}nav button{min-width:max-content}.grid,.grid.two,.form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.grid,.grid.two,.form-grid{grid-template-columns:1fr}main{padding:12px}.metric{font-size:24px}}

.today{background:linear-gradient(135deg,#17365d,#2d6ea6);color:white;border-radius:16px;padding:18px;margin-bottom:12px}
.today h2{margin:0 0 4px}.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:12px 0}
.kpi{background:white;border:1px solid var(--border);border-radius:12px;padding:12px}.kpi small{display:block;color:var(--muted)}.kpi strong{font-size:21px}
.ring{width:112px;height:112px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--good) calc(var(--score)*1%),#e5e7eb 0);position:relative;margin:auto}
.ring:after{content:"";position:absolute;width:82px;height:82px;border-radius:50%;background:white}.ring b{z-index:1;font-size:27px}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr 1fr}}@media(max-width:620px){.kpis{grid-template-columns:1fr 1fr}}

.report-bars{display:flex;align-items:flex-end;gap:10px;height:220px;padding:18px 8px 0;border-bottom:1px solid var(--border)}
.report-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:34px}
.report-bar{width:100%;max-width:54px;background:#2d6ea6;border-radius:6px 6px 0 0;min-height:2px}
.report-col span{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;word-break:break-word}
.alert-row{background:#fff3f2}.optimizer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.range-wrap{display:grid;grid-template-columns:1fr 100px;gap:10px;align-items:center}
input[type=range]{width:100%}
@media(max-width:700px){.optimizer-grid{grid-template-columns:1fr}.report-bars{overflow-x:auto;justify-content:flex-start}.report-col{min-width:52px}}


/* RyanOS 4 streamlined shell */
:root{--ryan-blue:#17365d;--ryan-bg:#f4f7fb;--ryan-card:#fff;--ryan-line:#dbe3ee;--ryan-text:#1f2a37;--ryan-muted:#667085}
body{background:var(--ryan-bg);color:var(--ryan-text)}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--ryan-line)}
header h1{font-size:1.15rem;margin:0}
nav{

 align-items:center;
 gap:8px;
 padding:10px 14px;

 border-bottom:1px solid var(--ryan-line);
 width:100%!important;
 min-height:auto!important;
 position:sticky;
 top:0;
 z-index:25;
 overflow-x:auto;
 box-sizing:border-box
}
nav button{
 display:inline-flex!important;
 align-items:center;
 justify-content:center;
 flex:0 0 auto!important;
 width:auto!important;
 min-width:120px!important;
 min-height:46px!important;
 height:auto!important;
 padding:10px 18px!important;
 margin:0!important;
 border-radius:12px!important;
 font-weight:700;
 white-space:nowrap
}
main{
 max-width:1180px!important;
 width:100%!important;
 margin:0 auto!important;
 padding:18px!important;
 box-sizing:border-box
}
.page-intro{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:12px}
.page-intro h2{margin:0 0 4px}
.page-intro p{margin:0;color:var(--ryan-muted)}
.hero-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:12px 0}
.hero-card{background:var(--ryan-card);border:1px solid var(--ryan-line);border-radius:18px;padding:16px;box-shadow:0 4px 14px rgba(23,54,93,.05)}
.hero-card .label{font-size:.82rem;color:var(--ryan-muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.hero-card .value{font-size:1.55rem;font-weight:800;margin-top:6px}
.hero-card .sub{font-size:.88rem;color:var(--ryan-muted);margin-top:5px}
.section-card{background:var(--ryan-card);border:1px solid var(--ryan-line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 4px 14px rgba(23,54,93,.04)}
.section-card h3{margin-top:0}
details.section-card{padding:0}
details.section-card summary{cursor:pointer;padding:16px;font-weight:800;list-style:none}
details.section-card summary::-webkit-details-marker{display:none}
details.section-card summary:after{content:"＋";float:right}

details.section-card .details-body{padding:0 16px 16px}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px}
.quick-actions button{min-height:44px;border-radius:12px}

.status-pill.good{background:#e9f7ef;color:#166534}
.status-pill.warn{background:#fff7e6;color:#92400e}
.status-pill.bad{background:#fdecec;color:#991b1b}
.stream-note{background:#eef4fb;border:1px solid #d8e4f2;border-radius:14px;padding:12px;color:#31435a}
.hide-advanced{display:none!important}

}
@media(max-width:560px){

:root{
 --page-max:1180px;
 --space-1:6px;

.page-intro{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}

}

button{

function splitCsvLine(line){
 var out=[],cur="",quoted=false;
 for(var i=0;i<line.length;i++){
  var ch=line[i];
  if(ch==='"'){
   if(quoted&&line[i+1]==='"'){cur+='"';i++;}
   else quoted=!quoted;
  }else if(ch===","&&!quoted){out.push(cur);cur="";}
  else cur+=ch;
 }
 out.push(cur);
 return out;
}
function findHeaderRow(lines){
 for(var i=0;i<Math.min(lines.length,25);i++){
  var cols=splitCsvLine(lines[i]).map(function(x){return String(x).trim().toLowerCase();});
  var hasDate=cols.some(function(h){return h.indexOf("date")>=0;});
  var hasAmount=cols.some(function(h){return h.indexOf("amount")>=0||h.indexOf("debit")>=0||h.indexOf("credit")>=0;});
  var hasDesc=cols.some(function(h){return h.indexOf("description")>=0||h.indexOf("merchant")>=0||h.indexOf("details")>=0||h.indexOf("payee")>=0;});
  if(hasDate&&hasAmount&&hasDesc)return i;
 }
 return -1;
}
function parseAmount(v){
 var s=String(v||"").replace(/[$,\s]/g,"");
 if(s.indexOf("(")>=0&&s.indexOf(")")>=0)s="-"+s.replace(/[()]/g,"");
 var n=Number(s);
 return isNaN(n)?0:n;
}
function normalizeDate(v){
 var s=String(v||"").trim();
 if(/^\d{8}$/.test(s))return s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8);
 return s;
}

function categorize(desc){
 var special=specialCategory(desc);if(special)return special;
 var d=cleanDescription(desc),matches=[];
 smartRules.forEach(function(r){if(d.indexOf(r[0])>=0)matches.push({keyword:r[0],category:r[1],include:"Yes",source:"smart"});});
 data.rules.forEach(function(r){
  if(!r||typeof r!=="object")return;
  var k=String(r.keyword||"").toUpperCase().trim();
  if(k&&d.indexOf(k)>=0)matches.push({keyword:k,category:r.category||"Needs Review",include:r.include||"Yes",source:"user"});
 });
 if(!matches.length)return{category:"Needs Review",include:"Yes",confidence:"low"};
 matches.sort(function(a,b){
  if(a.source!==b.source)return a.source==="user"?-1:1;
  return b.keyword.length-a.keyword.length;
 });
 return{category:matches[0].category,include:matches[0].include,confidence:matches[0].source==="user"?"high":"medium"};

function parseCsv(text){
 var lines=text.replace(/^\uFEFF/,"").split(/\r?\n/);
 var headerRow=findHeaderRow(lines);
 if(headerRow<0)return[];
 lines=lines.slice(headerRow);
 var headers=splitCsvLine(lines.shift()).map(function(x){return x.trim().toLowerCase();});
 function find(names){return headers.findIndex(function(h){return names.some(function(n){return h.indexOf(n)>=0;});});}
 var di=find(["transaction date","date posted","posting date","date"]);
 var xi=find(["description","details","merchant","payee"]);
 var ai=find(["transaction amount","amount"]);
 var debitI=find(["debit","withdrawal"]);
 var creditI=find(["credit","deposit"]);
 var typeI=find(["transaction type"]);
 var existing={};data.transactions.forEach(function(t){existing[txKey(t)]=true;});
 var imported=[];
 lines.forEach(function(line){
  if(!line.trim())return;
  var c=splitCsvLine(line);
  if(c.length<3)return;
  var desc=(c[xi]||"").trim();
  if(!desc)return;
  var amount=ai>=0?parseAmount(c[ai]):0;
  if(ai<0){
   var debit=debitI>=0?parseAmount(c[debitI]):0;
   var credit=creditI>=0?parseAmount(c[creditI]):0;
   amount=credit?credit:-Math.abs(debit);
  }
  if(typeI>=0){
   var typ=String(c[typeI]||"").trim().toUpperCase();
   if(typ==="DEBIT"&&amount>0)amount=-amount;
   if(typ==="CREDIT"&&amount<0)amount=Math.abs(amount);
  }
  var r=categorize(desc),t={date:normalizeDate(c[di]||""),description:desc,merchant:cleanDescription(desc),amount:amount,category:r.category,include:r.include,confidence:r.confidence};
  if(!existing[txKey(t)]){existing[txKey(t)]=true;imported.push(t);}
 });
 return imported;
}

function monthlyDebtPayment(d){
 var p=Number(d.payment||0)+Number(d.extraPayment||0);
 if(d.frequency==="Weekly")return p*52/12;
 if(d.frequency==="Biweekly")return p*26/12;
 if(d.frequency==="Semi-monthly")return p*24/12;
 if(d.frequency==="Annually")return p/12;
 return p;
}
function debtPayoffEstimate(d){
 var balance=Math.max(0,Number(d.balance||0));
 var payment=Math.max(0,monthlyDebtPayment(d));
 var rate=Math.max(0,Number(d.interestRate||0))/100/12;
 if(balance<=0)return{months:0,interest:0,status:"Paid off"};
 if(payment<=0)return{months:Infinity,interest:Infinity,status:"No payment"};
 if(rate===0){var m=Math.ceil(balance/payment);return{months:m,interest:0,status:"On track"};}
 if(payment<=balance*rate)return{months:Infinity,interest:Infinity,status:"Payment too low"};
 var months=Math.ceil(-Math.log(1-balance*rate/payment)/Math.log(1+rate));
 return{months:months,interest:Math.max(0,months*payment-balance),status:"On track"};
}

  if(isFinite(p.interest))a.interest+=p.interest;else a.problems++;
  if(isFinite(p.months))a.longest=Math.max(a.longest,p.months);

}

function retirementConfidenceScore(){
 var s=data.settings;
 var rows=retirementPlan(s.returnRate);
 var firstShortfall=0,endBalance=rows.length?Number(rows[rows.length-1].endBalance||0):0;
 for(var i=0;i<rows.length;i++){if(Number(rows[i].unfunded||0)>1){firstShortfall=rows[i].age;break;}}
 var tests=[
  retirementPlan(s.returnRate,null,"crash"),
  retirementPlan(s.returnRate,null,"badStart"),
  retirementPlan(s.returnRate,null,"lowReturn"),
  retirementPlan(s.returnRate,null,"highInflation"),
  retirementPlan(s.returnRate,null,"spendingShock")
 ];
 function passes(testRows){
  for(var j=0;j<testRows.length;j++){if(Number(testRows[j].unfunded||0)>1||testRows[j].depleted)return false;}
  return true;
 }
 var stressPasses=tests.filter(passes).length;
 var at=accountBalancesAtRetirement(s.returnRate);
 var annualSpend=Number(s.retireSpend||0);
 var reserveYears=annualSpend>0?at.total/annualSpend:0;
 var audit=foundationAudit();

 var fundingPoints=firstShortfall?0:30;
 var stressPoints=Math.round(stressPasses/5*30);
 var reservePoints=Math.max(0,Math.min(20,Math.round(reserveYears/20*20)));
 var endingPoints=endBalance>0?10:0;
 var dataPoints=Math.round(audit.passed/audit.total*10);
 var score=Math.max(0,Math.min(100,fundingPoints+stressPoints+reservePoints+endingPoints+dataPoints));
 var label=score>=85?"Very strong":score>=70?"Strong":score>=55?"Moderate":score>=40?"Weak":"At risk";

 return{
  score:score,label:label,
  parts:[
   {name:"Plan funding",points:fundingPoints,max:30},
   {name:"Stress tests",points:stressPoints,max:30},
   {name:"Starting reserve",points:reservePoints,max:20},
   {name:"Ending balance",points:endingPoints,max:10},
   {name:"Data quality",points:dataPoints,max:10}
  ],
  stressPasses:stressPasses,
  firstShortfall:firstShortfall,
  reserveYears:reserveYears
 };
}
function runRetirementScenario(changes){
 var s=data.settings;
 var original={};
 Object.keys(changes).forEach(function(k){original[k]=s[k];s[k]=changes[k];});
 var rows,firstShortfall=0,endBalance=0;
 try{
  rows=retirementPlan(s.returnRate);
  for(var i=0;i<rows.length;i++){if(Number(rows[i].unfunded||0)>1){firstShortfall=rows[i].age;break;}}
  endBalance=rows.length?Number(rows[rows.length-1].endBalance||0):0;
 }finally{
  Object.keys(original).forEach(function(k){s[k]=original[k];});
 }
 return{ok:!firstShortfall,shortfall:firstShortfall,endBalance:endBalance};
}

  {name:"Retire 1 year later",changes:{retireAge:currentAge+1},copy:"Tests one more year of saving and one less retirement year."},

 ];
 return scenarios.map(function(x){

 });
}

function txDateObj(v){

function monthlyHistory(count){

  var d=new Date(now.getFullYear(),now.getMonth()-i,1);
  var key=monthKeyFromDate(d),spend=0,income=0;
  data.transactions.forEach(function(t){

   if(!td||monthKeyFromDate(td)!==key)return;
   var amt=Number(t.amount||0);

   if(t.category==="Income")income+=Math.abs(amt);
  });
  out.push({key:key,label:d.toLocaleString("en-CA",{month:"short"}),spend:spend,income:income});
 }

}

function goalPlan(extra){
 var ordered=data.goals.slice().sort(function(a,b){return Number(a.priority||0)-Number(b.priority||0);});
 var states=ordered.map(function(g){
  var remaining=String(g.name||"").toUpperCase()==="LOC"
   ?Math.max(0,Number(g.current||0))
   :Math.max(0,Number(g.target||0)-Number(g.current||0));
  return{
   name:g.name,
   remaining:remaining,
   baseMonthly:Math.max(0,Number(g.monthly||0)),
   priority:Number(g.priority||0),
   completedMonth:remaining<=0?0:null,
   firstMonthFunding:0
  };
 });
 var rollover=Math.max(0,Number(extra||0));
 var maxMonths=600;
 for(var month=1;month<=maxMonths;month++){
  var activeIndex=states.findIndex(function(x){return x.remaining>0;});
  if(activeIndex<0)break;
  var completedThisMonth=[];
  states.forEach(function(x,i){
   if(x.remaining<=0)return;
   var funding=x.baseMonthly+(i===activeIndex?rollover:0);
   if(month===1)x.firstMonthFunding=funding;
   if(funding<=0)return;
   var paid=Math.min(x.remaining,funding);
   x.remaining-=paid;
   if(x.remaining<=0.005){
    x.remaining=0;
    x.completedMonth=month;
    completedThisMonth.push(i);
   }
  });
  completedThisMonth.forEach(function(i){
   rollover+=states[i].baseMonthly;
  });
 }
 return states.map(function(x,i){
  var original=ordered[i];
  var originalRemaining=String(original.name||"").toUpperCase()==="LOC"
   ?Math.max(0,Number(original.current||0))
   :Math.max(0,Number(original.target||0)-Number(original.current||0));
  return{
   name:x.name,
   remaining:originalRemaining,
   currentMonthly:x.baseMonthly,
   firstMonthFunding:x.firstMonthFunding,
   months:x.completedMonth
  };
 });
}

function retirementReconciliationStatus(){
 try{
  var rows=retirementPlan(data.settings.returnRate);
  var bad=rows.filter(function(r){
   var start=Number(r.startBalance||0),growth=Number(r.growth||0),income=Number(r.totalIncome||0);
   var spending=Number(r.spending||0),tax=Number(r.tax||0),future=Number(r.futureExpense||0);
   var end=Number(r.endBalance||0);
   var expected=start+growth+income-spending-tax-future;
   return Math.abs(expected-end)>5;
  });
  return{ok:bad.length===0,count:bad.length};
 }catch(err){return{ok:false,count:-1,error:String(err.message||err)};}
}
function transactionDataStatus(){

 });
 return{ok:bad.length===0,count:bad.length};
}

  investments:Math.abs(Number(t.investments)-Number(detailedInvestmentTotal()))<1,
  investing:Math.abs(Number(t.investing)-Number(detailedMonthlyInvesting()))<1,
  debt:Math.abs(Number(t.debt)-Number(authoritativeDebtTotal()))<1,

}

function validateBackupObject(obj){
