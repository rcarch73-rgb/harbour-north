:root{--navy:#0B1F3A;--blue:#2F6FA7;--aqua:#6DB4D6;--mist:#BCE5EA;--sand:#E8E1D6;--bg:#f4f8fb;--card:#fff;--text:#1f2937;--muted:#667085;--border:#d7e2ea;--good:#138a4b;--bad:#b42318;--warn:#fff2cc}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(110deg,#0B1F3A,#14375f);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(11,31,58,.18)}
.brand-lockup{display:flex;align-items:center;gap:12px;min-width:0}
.brand-logo{display:block;width:240px;max-width:46vw;height:auto;filter:brightness(0) invert(1);object-fit:contain;object-position:left center}
.brand-version{display:block;opacity:.78;margin-top:2px;font-size:12px;letter-spacing:.02em}
@media(max-width:620px){.brand-logo{width:185px;max-width:52vw}.brand-version{font-size:10px}}
button,input,select,textarea{font:inherit}button{border:0;border-radius:9px;padding:9px 12px;background:var(--blue);color:#fff}
button.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}button.danger{background:#fff;color:var(--bad);border:1px solid var(--bad)}
.shell{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 72px)}
nav{background:#102a49;padding:10px;position:sticky;top:72px;height:calc(100vh - 72px);overflow:auto}
nav button{display:block;width:100%;text-align:left;background:transparent;margin:3px 0}nav button.active{background:#2d5f90}
main{padding:18px;max-width:1400px;width:100%;margin:auto}.page{display:none}.page.active{display:block}
h2{margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;box-shadow:0 2px 8px rgba(23,54,93,.06)}
.card h3{margin:0 0 8px;color:var(--muted);font-size:14px}.metric{font-size:28px;font-weight:750}.good{color:var(--good)}.bad{color:var(--bad)}
.notice{background:var(--warn);padding:12px;border-radius:10px;margin:12px 0}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:9px;border-bottom:1px solid var(--border);text-align:left;font-size:13px;vertical-align:top}th{background:#edf3f9}
input,select,textarea{border:1px solid #b8c5d1;border-radius:8px;padding:8px;background:#fff;max-width:100%}input[type=number]{width:120px}textarea{width:100%;min-height:90px}
.progress{height:11px;border-radius:99px;background:#e5e7eb;overflow:hidden}.progress span{display:block;height:100%;background:var(--good)}
.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
@media(max-width:900px){.shell{grid-template-columns:1fr}nav{position:static;height:auto;display:flex;overflow:auto;gap:4px}nav button{min-width:max-content}.grid,.grid.two,.form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.grid,.grid.two,.form-grid{grid-template-columns:1fr}main{padding:12px}.metric{font-size:24px}}

.today{background:linear-gradient(135deg,#17365d,#2d6ea6);color:white;border-radius:16px;padding:18px;margin-bottom:12px}
.today h2{margin:0 0 4px}.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:12px 0}
.kpi{background:white;border:1px solid var(--border);border-radius:12px;padding:12px}.kpi small{display:block;color:var(--muted)}.kpi strong{font-size:21px}
.ring{width:112px;height:112px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--good) calc(var(--score)*1%),#e5e7eb 0);position:relative;margin:auto}
.ring:after{content:"";position:absolute;width:82px;height:82px;border-radius:50%;background:white}.ring b{z-index:1;font-size:27px}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr 1fr}}@media(max-width:620px){.kpis{grid-template-columns:1fr 1fr}}

.report-bars{display:flex;align-items:flex-end;gap:10px;height:220px;padding:18px 8px 0;border-bottom:1px solid var(--border)}
.report-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:34px}
.report-bar{width:100%;max-width:54px;background:#2d6ea6;border-radius:6px 6px 0 0;min-height:2px}
.report-col span{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;word-break:break-word}
.alert-row{background:#fff3f2}.optimizer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.range-wrap{display:grid;grid-template-columns:1fr 100px;gap:10px;align-items:center}
input[type=range]{width:100%}
@media(max-width:700px){.optimizer-grid{grid-template-columns:1fr}.report-bars{overflow-x:auto;justify-content:flex-start}.report-col{min-width:52px}}


/* Harbour North 4 streamlined shell */

 justify-content:center;

}

.page-intro h2{margin:0 0 4px}
.page-intro p{margin:0;color:var(--ryan-muted)}
.hero-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:12px 0}
.hero-card{background:var(--ryan-card);border:1px solid var(--ryan-line);border-radius:18px;padding:16px;box-shadow:0 4px 14px rgba(23,54,93,.05)}
.hero-card .label{font-size:.82rem;color:var(--ryan-muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}

.section-card h3{margin-top:0}

.status-pill.good{background:#e9f7ef;color:#166534}
.status-pill.warn{background:#fff7e6;color:#92400e}
.status-pill.bad{background:#fdecec;color:#991b1b}
.stream-note{background:#eef4fb;border:1px solid #d8e4f2;border-radius:14px;padding:12px;color:#31435a}

:root{
 --page-max:1180px;
 --space-1:6px;
 --space-2:10px;
 --space-3:14px;
 --space-4:18px;
 --space-5:24px;
 --radius-sm:10px;
 --radius-md:14px;
 --radius-lg:18px;
 --border:#dbe3ee;
 --text:#1f2937;
 --muted:#667085;
 --brand:#17365d;
 --surface:#ffffff;
 --surface-soft:#f8fafc;
}
main{max-width:var(--page-max);margin:0 auto;padding:18px}
.page{animation:pageIn .18s ease-out}
@keyframes pageIn{from{opacity:.35;transform:translateY(4px)}to{opacity:1;transform:none}}
.page-intro{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}
.page-intro h2{margin:0 0 4px;font-size:1.7rem;line-height:1.15;color:var(--brand)}
.page-intro p{margin:0;color:var(--muted);max-width:720px}
.section-card,.hero-card,.backup-card,.tx-summary,.ret-kpi,.ret-milestone,.ret-stress{
 box-shadow:0 1px 2px rgba(16,24,40,.04);
}
.section-card{border-radius:var(--radius-lg);padding:18px;margin:14px 0}
.section-card h3{margin:0 0 12px;color:var(--brand);font-size:1.08rem}
.hero-grid{gap:12px}
.hero-card{border-radius:var(--radius-lg);padding:16px}
.hero-card .label{letter-spacing:.025em}
.hero-card .value{line-height:1.1}
.quick-actions,.toolbar,.money-toolbar,.tx-filter-row{gap:10px}
button{
 min-height:42px;
 border-radius:12px;
 font-weight:800;
 padding:10px 14px;
}
input,select,textarea{

 border-radius:10px;

 padding:9px 10px;

label{font-weight:700;color:#344054}
table{border-collapse:separate;border-spacing:0;width:100%}

.notice{border-radius:12px;padding:11px 13px}
.status-pill{white-space:nowrap}

.more-hub{border:1px solid var(--border);border-radius:16px;padding:16px;background:linear-gradient(135deg,#fff,#f5f9fc);margin-bottom:14px}
.more-hub-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}
.more-hub-card{border:1px solid var(--border);border-radius:13px;padding:14px;background:#fff}
.more-hub-card .label{font-size:.73rem;text-transform:uppercase;font-weight:900;color:var(--muted)}
.more-hub-card .value{font-size:1.08rem;font-weight:900;color:var(--navy);margin-top:4px}
.more-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.report-purpose{border-left:5px solid var(--blue);background:#f7fafc;border-radius:12px;padding:13px 15px;margin-bottom:14px}
.settings-group{border:1px solid var(--border);border-radius:14px;background:#fff;margin:12px 0}
.settings-group>summary{cursor:pointer;padding:14px 16px;font-weight:900;color:var(--navy);display:flex;justify-content:space-between}
.settings-group>summary::-webkit-details-marker{display:none}
.settings-group>summary:after{content:"＋";color:var(--muted)}
.settings-group[open]>summary:after{content:"−"}
.settings-group-body{padding:0 14px 14px}
@media(max-width:700px){.more-hub-grid{grid-template-columns:1fr}}


/* Harbour North 5.8.33 unified interface and final polish */
body{line-height:1.45}
main{padding-top:16px!important;padding-bottom:36px!important}
.page-intro{margin-bottom:12px}
.page-intro h2{font-size:1.65rem}
.section-card,.card,.hero-card,.backup-card,.tx-summary,.ret-kpi,.ret-milestone,.ret-stress{
 border-color:#d6e1e9;
 box-shadow:0 1px 3px rgba(11,31,58,.05);
}
button{min-height:38px;cursor:pointer}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible{
 outline:3px solid rgba(47,111,167,.28);
 outline-offset:2px;
}
.status-pill{white-space:nowrap}
details.advanced-section{overflow:hidden}
details.advanced-section>summary{min-height:46px}
.table-fit{width:100%;table-layout:fixed}
.table-fit input,.table-fit select{width:100%;min-width:0}
.mobile-scroll-hint{font-size:.78rem}
.unified-note{border:1px solid #c8d7e8;background:#f5f9fc;border-radius:12px;padding:11px 13px;margin:10px 0}
@media(max-width:760px){
 main{padding:12px!important}
 .page-intro{display:block}
 .page-intro .quick-actions{margin-top:10px}
 button{min-height:42px}
}


.health-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0}
.health-card{border:1px solid var(--border);border-radius:14px;padding:14px;background:#fff}
.health-card .label{font-size:.73rem;text-transform:uppercase;font-weight:900;color:var(--muted)}
.health-card .value{font-size:1.2rem;font-weight:900;color:var(--navy);margin-top:4px}
.health-checks{display:grid;gap:8px;margin-top:12px}
.health-check{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:start;border:1px solid var(--border);border-radius:12px;padding:11px;background:#fff}
.health-check.pass{border-color:#b7d8c0;background:#f7fcf8}
.health-check.fail{border-color:#e7b8b8;background:#fff8f8}
.health-check .name{font-weight:850;color:var(--navy)}
.health-check .detail{font-size:.85rem;color:var(--muted);margin-top:2px}
.health-check .result{font-size:.78rem;font-weight:900;text-transform:uppercase}
@media(max-width:850px){.health-summary{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.health-summary{grid-template-columns:1fr}.health-check{grid-template-columns:24px 1fr}.health-check .result{grid-column:2}}


/* Harbour North 5.8.33 editable future expenses */
.future-expense-grid{display:grid;grid-template-columns:1.4fr .7fr .9fr .8fr .8fr auto;gap:8px;align-items:end}
.future-expense-list{display:grid;gap:8px;margin-top:12px}
.future-expense-row{display:grid;grid-template-columns:42px 1.4fr .8fr .9fr .9fr auto;gap:8px;align-items:center;border:1px solid var(--border);border-radius:12px;padding:10px;background:#fff}

 .future-expense-grid{grid-template-columns:1fr 1fr}

}
@media(max-width:520px){

 .future-expense-row>*:not(:first-child){grid-column:2}
 .future-expense-row .future-delete{grid-column:2}
}

.sync-card .label{font-size:.72rem;text-transform:uppercase;font-weight:900;color:var(--muted)}
.sync-card .value{font-size:1.05rem;font-weight:900;color:var(--navy);margin-top:4px}
.release-freeze{border:1px solid #b8d6df;background:#f3fbfc;border-radius:12px;padding:12px 14px;margin-top:12px}

/* Harbour North 5.8.33 navigation and settings fixes */

/* Harbour North 5.8.33 scenario comparison */

.scenario-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:12px}

@media(max-width:520px){.scenario-inputs{grid-template-columns:1fr}}

/* Harbour North 5.8.33 editable budget categories */

/* Harbour North 5.8.33 single-table drag-and-drop budget categories */
.budget-drag-row{transition:opacity .15s ease,transform .15s ease}

.budget-drag-row.drag-over{outline:2px dashed #6DB4D6;outline-offset:-3px}
.budget-drag-handle{cursor:grab;user-select:none;font-size:1.2rem;font-weight:900;text-align:center;touch-action:none;min-width:34px}
.budget-drag-handle:active{cursor:grabbing}
.budget-category-inline{display:flex;gap:8px;align-items:center;min-width:230px}
.budget-category-inline input{width:100%!important;min-width:150px}
.budget-row-delete{padding:8px 10px!important;white-space:nowrap}

}

/* Harbour North 5.8.33 retirement charts tab */
#charts>.page-intro{margin-bottom:12px}
#charts>.compact-note{margin-bottom:14px}
#charts .section-card,#charts .card,#charts details{scroll-margin-top:110px}


/* Harbour North 5.8.33 final beta audit */
.final-beta-audit{border:1px solid var(--border);border-radius:18px;background:#fff;padding:16px;margin:14px 0}
.final-beta-audit-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
.final-beta-audit-item{display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:center;border:1px solid var(--border);border-radius:13px;padding:11px;background:#fbfdfe}
.final-beta-audit-item .icon{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:900}
.final-beta-audit-item.pass .icon{background:#e8f6ee;color:var(--good)}
.final-beta-audit-item.fail .icon{background:#fff0ed;color:var(--bad)}
.final-beta-audit-item .name{font-weight:900;color:var(--navy)}
.final-beta-audit-item .detail{font-size:.82rem;color:var(--muted);margin-top:2px}
.final-beta-audit-item .result{font-size:.78rem;font-weight:900}
@media(max-width:760px){.final-beta-audit-grid{grid-template-columns:1fr}}

function financialHealth(){
 var t=totals();
 var month=data.reportMonth||data.review.month||new Date().toISOString().slice(0,7);
 var monthTx=monthTransactions(month);
 var monthSpend=monthTx.filter(function(x){return x.include==="Yes";}).reduce(function(a,x){return a+Math.abs(Number(x.amount||0));},0);
 var budgetPoints;
 var budgetNote;
 if(monthTx.length===0){
  budgetPoints=15;
  budgetNote="No transactions imported for "+month+"; neutral score used.";
 }else{
  var ratio=t.spending>0?monthSpend/t.spending:1;
  budgetPoints=ratio<=0.90?25:ratio<=1?25-(ratio-0.90)*100:Math.max(0,15-(ratio-1)*75);
  budgetNote=money(monthSpend)+" spent against "+money(t.spending)+" monthly budget.";
 }
 budgetPoints=Math.round(Math.max(0,Math.min(25,budgetPoints)));

 var cashRatio=t.income>0?t.surplus/t.income:0;
 var cashPoints=cashRatio>=0.10?20:cashRatio>=0?15:cashRatio>=-0.05?8:0;
 var cashNote="Planned monthly result: "+money(t.surplus)+".";

 var locGoal=data.goals.find(function(g){return String(g.name||"").toUpperCase()==="LOC";});
 var locStart=Math.max(Number(locGoal&&locGoal.target||0),23000,Number(data.settings.loc||0));
 var debtProgress=locStart>0?(locStart-Number(data.settings.loc||0))/locStart:1;
 var debtPoints=Math.round(15*Math.max(0,Math.min(1,debtProgress)));
 var debtNote="LOC balance: "+money(data.settings.loc)+" from a "+money(locStart)+" starting balance.";

 var emergency=data.goals.find(function(g){return String(g.name||"").toLowerCase().indexOf("emergency")>=0;});
 var emergencyProgress=emergency&&Number(emergency.target)>0?Number(emergency.current||0)/Number(emergency.target):0;
 var emergencyPoints=Math.round(15*Math.max(0,Math.min(1,emergencyProgress)));
 var emergencyNote=emergency?money(emergency.current)+" saved toward "+money(emergency.target)+".":"No emergency-fund goal found.";

 var incomplete=data.goals.filter(function(g){return g.name!=="LOC"&&Number(g.current||0)<Number(g.target||0);});
 var funded=incomplete.filter(function(g){return Number(g.monthly||0)>0;}).length;
 var goalPoints=incomplete.length?Math.round(10*funded/incomplete.length):10;
 var goalNote=funded+" of "+incomplete.length+" incomplete non-LOC goals have monthly funding.";

 var nwPoints=5,nwNote="Add two net-worth snapshots to measure the trend.";
 if(data.netWorthHistory.length>=2){
  var sorted=data.netWorthHistory.slice().sort(function(a,b){return String(a.month).localeCompare(String(b.month));});
  var prev=Number(sorted[sorted.length-2].value||0),latest=Number(sorted[sorted.length-1].value||0);
  var change=latest-prev;
  nwPoints=change>0?10:change===0?6:0;
  nwNote="Latest net-worth change: "+money(change)+".";
 }

 var retire=projection(data.settings.retireAge);
 var wifeAge=data.settings.retireAge-data.settings.wifeAgeDiff;
 var guaranteed=pensionAnnualAmount("user",Number(data.settings.retireAge)).total+pensionAnnualAmount("spouse",wifeAge).total;
 if(data.settings.retireAge>=data.settings.userCppStart)guaranteed+=(data.settings.userCppStart===70?data.settings.userCpp70:data.settings.userCpp65)*12;
 var capitalTarget=Math.max(0,(retire.spend-guaranteed)*25);
 var retirementRatio=capitalTarget>0?retire.inv/capitalTarget:1;
 var retirementPoints=Math.round(5*Math.max(0,Math.min(1,retirementRatio)));
 var retirementNote="Projected investments at "+data.settings.retireAge+": "+money(retire.inv)+"; rough capital target: "+money(capitalTarget)+".";

 var parts=[
  {name:"Monthly budget",points:budgetPoints,max:25,note:budgetNote},
  {name:"Cash-flow plan",points:cashPoints,max:20,note:cashNote},
  {name:"LOC reduction",points:debtPoints,max:15,note:debtNote},
  {name:"Emergency fund",points:emergencyPoints,max:15,note:emergencyNote},
  {name:"Goal funding",points:goalPoints,max:10,note:goalNote},
  {name:"Net-worth trend",points:nwPoints,max:10,note:nwNote},
  {name:"Retirement progress",points:retirementPoints,max:5,note:retirementNote}
 ];
 var total=parts.reduce(function(a,x){return a+x.points;},0);
 return{total:Math.max(0,Math.min(100,total)),parts:parts,month:month};
}

function opportunityAlerts(){
 var s=data.settings,t=totals();
 var alerts=[];
 var monthly=Number(t.surplus||0);
 var freeCash=Math.max(0,monthly);
 var annual=monthly*12;
 var debtBalance=authoritativeDebtTotal();
 var debtPayment=authoritativeDebtPayment();

 alerts.push({
  type:monthly>=0?"good":"bad",
  label:monthly>=0?"Available monthly capacity":"Monthly funding gap",
  value:money(Math.abs(monthly)),
  copy:monthly>=0
   ?"This remains after planned spending, bills, investing, goals and debt payments."
   :"Planned commitments currently exceed monthly income by this amount."
 });

 alerts.push({
  type:annual>=0?"good":"bad",
  label:annual>=0?"Annual flexibility":"Annualized shortfall",
  value:money(Math.abs(annual)),
  copy:annual>=0
   ?"Your current monthly surplus equals this much potential annual flexibility."
   :"The current monthly gap would total this amount over a full year."
 });

 if(debtBalance>0&&debtPayment>0){
  alerts.push({
   type:"warn",
   label:"Capacity after debt payoff",
   value:money(freeCash+debtPayment),
   copy:"When included debts are paid off, their current monthly payments could become available for investing, goals or lifestyle spending."
  });
 }

 var goals=(data.goals||[]).filter(function(g){return g.name!=="LOC"&&Number(g.current||0)<Number(g.target||0);});
 if(goals.length&&freeCash>0){
  goals.sort(function(a,b){return Number(a.priority||999)-Number(b.priority||999);});
  var g=goals[0],remaining=Math.max(0,Number(g.target||0)-Number(g.current||0));
  var accelerated=Number(g.monthly||0)+freeCash;
  var months=accelerated>0?Math.ceil(remaining/accelerated):0;
  alerts.push({
   type:"good",
   label:"Fastest goal opportunity",
   value:months?months+" months":"—",
   copy:"Directing available cash to "+g.name+" could complete the remaining "+money(remaining)+" in about "+months+" months."
  });
 }

 var future=(data.futureExpenses||[]).filter(function(x){return Number(x.amount||0)>0;}).sort(function(a,b){return Number(a.age||999)-Number(b.age||999);});
 if(future.length){
  var next=future[0],years=Math.max(.1,Number(next.age||0)-Number(s.age||0));
  var monthlyNeed=Number(next.amount||0)/(years*12);
  alerts.push({
   type:freeCash>=monthlyNeed?"good":"warn",
   label:"Next future expense funding",
   value:money(monthlyNeed)+"/mo",
   copy:(freeCash>=monthlyNeed?"Current surplus could cover":"Current surplus may not fully cover")+" "+next.name+" by age "+Number(next.age||0).toFixed(0)+" without changing other priorities."
  });
 }

 return alerts.slice(0,5);
}
function recommendedActions(){
 var s=data.settings,t=totals(),ret=retirementHeadline(),debt=debtTotals();
 var actions=[];

 if(t.surplus<0){
  actions.push({priority:1,level:"high",impact:"High impact",title:"Fix the monthly cash-flow shortfall",copy:"Reduce planned spending or commitments by about "+money(Math.abs(t.surplus))+" per month before adding new goals."});
 }

 if(!ret.ok){
  actions.push({priority:1,level:"high",impact:"High impact",title:"Strengthen the retirement plan",copy:"The plan first shows a shortfall at age "+ret.shortfall+". Review retirement age, spending or investment assumptions."});
 }

 if(debt.problems){
  actions.push({priority:1,level:"high",impact:"High impact",title:"Correct a debt payment",copy:"At least one included debt has no payment or a payment too low to reduce principal."});
 }else if(debt.balance>0){
  var highest=(data.debts||[]).filter(function(d){return Number(d.include)!==0;}).sort(function(a,b){return Number(b.interestRate||0)-Number(a.interestRate||0);})[0];
  if(highest){
   actions.push({priority:2,level:"medium",impact:"Medium impact",title:"Focus extra payments on "+(highest.name||"the highest-rate debt"),copy:"This debt has the highest listed rate at "+Number(highest.interestRate||0).toFixed(2)+"%. Directing extra payments here should reduce total interest fastest."});
  }
 }

 var incompleteGoals=(data.goals||[]).filter(function(g){return Number(g.current||0)<Number(g.target||0)&&g.name!=="LOC";}).sort(function(a,b){return Number(a.priority||999)-Number(b.priority||999);});
 if(incompleteGoals.length){
  var g=incompleteGoals[0],remaining=Math.max(0,Number(g.target||0)-Number(g.current||0));
  actions.push({priority:3,level:"medium",impact:"Next priority",title:"Continue funding "+g.name,copy:money(remaining)+" remains to reach the target. Current monthly funding is "+money(Number(g.monthly||0))+"."});
 }

 var history=(data.netWorthHistory||[]);
 if(history.length<2){
  actions.push({priority:4,level:"low",impact:"Tracking",title:"Save another net worth snapshot",copy:"A second snapshot will create a meaningful trend line and month-to-month comparison."});
 }

 var audit=foundationAudit();
 if(audit.passed<audit.total){
  actions.push({priority:1,level:"high",impact:"Data quality",title:"Resolve Foundation Audit issues",copy:(audit.total-audit.passed)+" automated check(s) need attention in Settings & Data."});
 }

 if(!actions.length){
  actions.push({priority:5,level:"low",impact:"Maintain",title:"Stay the course",copy:"No urgent actions are currently identified. Continue monthly reviews and update balances regularly."});
 }

 actions.sort(function(a,b){return a.priority-b.priority;});
 return actions.slice(0,5);
}

 }

 var audit=foundationAudit();
 if(audit.passed===audit.total){

function healthcarePlanAnalysis(){
 var h=ensureHealthcarePlanner(),t=totals();
 var years=Math.max(.1,Number(h.yearsUntilRetirement||0));

 var annualOngoing=
  Number(h.monthlyPremiums||0)*12+
  Number(h.annualDentalVision||0)+
  Number(h.annualMedications||0)+
  Number(h.annualTravelMedical||0)+
  Number(h.annualOther||0);
 var reserveGap=Math.max(0,Number(h.targetReserve||0)-Number(h.currentReserve||0));
 var monthlyReserve=reserveGap/months;
 var totalMonthlyNeed=monthlyReserve+annualOngoing/12;
 var capacity=Number(t.surplus||0);
 var gap=totalMonthlyNeed-capacity;

 return{
  annualOngoing:annualOngoing,
  reserveGap:reserveGap,
  monthlyReserve:monthlyReserve,
  totalMonthlyNeed:totalMonthlyNeed,
  capacity:capacity,
  gap:gap,
  fundedPercent:fundedPercent,
  affordable:capacity>=totalMonthlyNeed
 };
}

function vehiclePlanAnalysis(){
 var v=ensureVehiclePlanner();
 var years=Math.max(.1,Number(v.yearsUntil||0));
 var months=Math.max(1,Math.round(years*12));
 var netCost=Math.max(0,Number(v.replacementCost||0)-Number(v.tradeInValue||0));
 var savingsNeed=Math.max(0,netCost-Number(v.downPayment||0));
 var monthlySave=savingsNeed/months;
 var financePrincipal=Math.max(0,netCost-Number(v.downPayment||0));
 var monthlyRate=Number(v.financeRate||0)/100/12;
 var n=Math.max(1,Math.round(Number(v.financeYears||0)*12));
 var financePayment=monthlyRate>0?financePrincipal*monthlyRate*Math.pow(1+monthlyRate,n)/(Math.pow(1+monthlyRate,n)-1):financePrincipal/n;
 var repairTotal=Math.max(0,Number(v.annualRepairCost||0))*years;
 var keepCost=repairTotal+Math.max(0,Number(v.currentValue||0)-Number(v.tradeInValue||0));
 var buyNowCost=netCost;
 var cashFlow=totals().surplus;
 var affordableSave=cashFlow>=monthlySave;
 var affordableFinance=cashFlow>=financePayment;
 return{
  months:months,
  netCost:netCost,
  monthlySave:monthlySave,
  financePayment:financePayment,
  repairTotal:repairTotal,
  keepCost:keepCost,
  buyNowCost:buyNowCost,
  affordableSave:affordableSave,
  affordableFinance:affordableFinance,
  cashFlow:cashFlow
 };
}

function normalizeBudgetCategoryName(name){
 return String(name||"").replace(/\s+/g," ").trim();
}
function budgetCategoryExists(name,exceptIndex){
 var target=normalizeBudgetCategoryName(name).toLowerCase();
 return data.budget.some(function(x,i){return i!==Number(exceptIndex)&&normalizeBudgetCategoryName(x[0]).toLowerCase()===target;});
}
function renameBudgetCategory(index,newName){
 index=Number(index);
 if(!data.budget[index])return{ok:false,message:"Budget category not found."};
 var clean=normalizeBudgetCategoryName(newName),old=String(data.budget[index][0]||"");
 if(!clean)return{ok:false,message:"Category name cannot be blank."};
 if(budgetCategoryExists(clean,index))return{ok:false,message:"A category with that name already exists."};
 data.budget[index][0]=clean;
 (data.transactions||[]).forEach(function(t){if(String(t.category||"")===old)t.category=clean;});
 (data.rules||[]).forEach(function(r){if(String(r.category||"")===old)r.category=clean;});
 smartRules.forEach(function(r){if(String(r[1]||"")===old)r[1]=clean;});
 localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
 return{ok:true,message:'Renamed "'+old+'" to "'+clean+'".'};
}
function addBudgetCategory(name){
 var clean=normalizeBudgetCategoryName(name);
 if(!clean)return{ok:false,message:"Enter a category name first."};
 if(budgetCategoryExists(clean,-1))return{ok:false,message:"That category already exists."};
 data.budget.push([clean,0]);
 localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
 return{ok:true,message:'Added "'+clean+'".'};
}
function deleteBudgetCategory(index){
 index=Number(index);
 if(!data.budget[index])return{ok:false,message:"Budget category not found."};
 if(data.budget.length<=1)return{ok:false,message:"At least one budget category is required."};
 var removed=String(data.budget[index][0]||"Category");
 var selectedFallback=budgetFallbackCategory();
 var fallback=data.budget.find(function(x,i){return i!==index&&String(x[0])===selectedFallback;})||data.budget.find(function(x,i){return i!==index;});
 var fallbackName=fallback?String(fallback[0]||"Other"):"Other";
 data.budget.splice(index,1);
 if(data.budgetFallbackCategory===removed)data.budgetFallbackCategory=fallbackName;

function wireBudgetDragAndDrop(){

  row.addEventListener("dragover",function(e){

   if(e.dataTransfer)e.dataTransfer.dropEffect="move";

  row.addEventListener("dragleave",function(){row.classList.remove("drag-over");});
  row.addEventListener("drop",function(e){
   e.preventDefault();

function moneyOverviewData(){
 var s=data.settings;
 var month=data.reportMonth||data.review.month||new Date().toISOString().slice(0,7);
 var monthTx=monthTransactions(month);
 var actualSpend=monthTx.filter(function(x){return x.include==="Yes";}).reduce(function(a,x){return a+Math.abs(Number(x.amount||0));},0);
 var income=Number(s.income1||0)+Number(s.income2||0)+Number(s.wcb||0);
 var budget=data.budget.reduce(function(a,x){return a+Number(x[1]||0);},0);
 var investing=detailedMonthlyInvesting();
 var goals=(data.goals||[]).filter(function(g){return String(g.name||"").toUpperCase()!=="LOC";}).reduce(function(a,g){return a+Number(g.monthly||0);},0);
 var debt=authoritativeDebtPayment();
 var fixed=Number(s.bills||0)+Number(s.chores||0);
 var plannedOut=budget+investing+goals+debt+fixed;
 var plannedRemaining=income-plannedOut;
 var actualRemaining=income-fixed-investing-goals-debt-actualSpend;
 return{month:month,transactions:monthTx.length,actualSpend:actualSpend,income:income,budget:budget,investing:investing,goals:goals,debt:debt,fixed:fixed,plannedOut:plannedOut,plannedRemaining:plannedRemaining,actualRemaining:actualRemaining};
}

function renderMoney(){

 summary.textContent="Detailed cash flow and planning tools";

 while(root.firstChild)body.appendChild(root.firstChild);
 var duplicateTitle=body.querySelector?body.querySelector(".page-intro"):null;
 if(duplicateTitle&&duplicateTitle.parentNode)duplicateTitle.parentNode.removeChild(duplicateTitle);
 var budgetCard=null;
 Array.prototype.slice.call(body.querySelectorAll?body.querySelectorAll(".section-card"):[]).some(function(card){

 while(overview.firstChild)root.appendChild(overview.firstChild);
 root.appendChild(advanced);
}

function splitCsvLine(line){

  if(ch==='"'){
   if(quoted&&line[i+1]==='"'){cur+='"';i++;}
   else quoted=!quoted;

  else cur+=ch;

}
function findHeaderRow(lines){

  var hasDate=cols.some(function(h){return h.indexOf("date")>=0;});
  var hasAmount=cols.some(function(h){return h.indexOf("amount")>=0||h.indexOf("debit")>=0||h.indexOf("credit")>=0;});
  var hasDesc=cols.some(function(h){return h.indexOf("description")>=0||h.indexOf("merchant")>=0||h.indexOf("details")>=0||h.indexOf("payee")>=0;});

function parseCsv(text){

 var di=find(["transaction date","date posted","posting date","date"]);

  var desc=(c[xi]||"").trim();
  if(!desc)return;
  var amount=ai>=0?parseAmount(c[ai]):0;

   var debit=debitI>=0?parseAmount(c[debitI]):0;

function monthlyDebtPayment(d){
 var p=Number(d.payment||0)+Number(d.extraPayment||0);
 if(d.frequency==="Weekly")return p*52/12;
 if(d.frequency==="Biweekly")return p*26/12;
 if(d.frequency==="Semi-monthly")return p*24/12;
 if(d.frequency==="Annually")return p/12;
 return p;
}
function debtPayoffEstimate(d){
 var balance=Math.max(0,Number(d.balance||0));
 var payment=Math.max(0,monthlyDebtPayment(d));
 var rate=Math.max(0,Number(d.interestRate||0))/100/12;
 if(balance<=0)return{months:0,interest:0,status:"Paid off"};
 if(payment<=0)return{months:Infinity,interest:Infinity,status:"No payment"};
 if(rate===0){var m=Math.ceil(balance/payment);return{months:m,interest:0,status:"On track"};}
 if(payment<=balance*rate)return{months:Infinity,interest:Infinity,status:"Payment too low"};
 var months=Math.ceil(-Math.log(1-balance*rate/payment)/Math.log(1+rate));
 return{months:months,interest:Math.max(0,months*payment-balance),status:"On track"};
}

function coreSpendingCategory(cat){

  "income","transfer","transfers","investment","investments","debt","debt payment",
  "credit card payment","loan payment","bank fee","bank fees",
  "travel","boat and outdoor","home and garden","vehicle"
 ];

function spendingEstimate(){
 var s=data.settings;

 var now=new Date();
 var currentMonthStart=new Date(now.getFullYear(),now.getMonth(),1);
 var start=new Date(now.getFullYear(),now.getMonth()-lookback,1);
 var monthly={},excludedCount=0,spendingCount=0;

 data.transactions.forEach(function(t){
  var d=txDateObj(t.date);
  if(!d||d<start||d>=currentMonthStart||String(t.include||"")!=="Yes")return;
  if(likelyTransferTransaction(t)){excludedCount++;return;}
  var amount=Math.abs(Number(t.amount||0));
  if(!isFinite(amount)||amount<=0)return;
  var key=monthKeyFromDate(d);
  if(!monthly[key])monthly[key]={core:0,total:0,count:0};
  monthly[key].total+=amount;
  if(coreSpendingCategory(t.category))monthly[key].core+=amount;
  monthly[key].count++;
  spendingCount++;
 });

 var keys=Object.keys(monthly).sort();
 var coreMonths=keys.map(function(k){return monthly[k].core;});
 var totalMonths=keys.map(function(k){return monthly[k].total;});
 function average(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:0;}
 function median(a){
  if(!a.length)return 0;
  var b=a.slice().sort(function(x,y){return x-y;});
  var mid=Math.floor(b.length/2);
  return b.length%2?b[mid]:(b[mid-1]+b[mid])/2;
 }

 var avgCore=average(coreMonths);
 var medCore=median(coreMonths);
 var avgTotal=average(totalMonths);
 var useMedian=coreMonths.length>=3;
 var selectedMonthlyCore=useMedian?medCore:avgCore;
 var annualizedCore=selectedMonthlyCore*12;
 var annualizedTotal=avgTotal*12;
 var irregularAllowance=Math.max(0,Number(s.irregularAnnualAllowance||0));
 var retirementEstimate=annualizedCore+irregularAllowance;
 var budgetMonthly=(data.budget||[]).reduce(function(a,x){return a+Math.max(0,Number(x[1]||0));},0);
 var budgetAnnual=budgetMonthly*12;
 var suggestedBaseline=budgetAnnual>0?budgetAnnual:retirementEstimate;
 var suggestedSource=budgetAnnual>0?"Current monthly budget":"Transaction history";

 return{
  lookback:lookback,observedMonths:keys.length,monthKeys:keys,monthly:monthly,

 var monthly=Number(s[prefix+"PensionMonthly"]||0);
 var indexed=Number(s[prefix+"PensionIndexed"]||0);
 var rate=indexed===1?Number(s[prefix+"PensionIndexRate"]||s.inflation||0):indexed===2?Number(s[prefix+"PensionIndexRate"]||0):0;
 var years=Math.max(0,personAge-start);
 var base=monthly*12*Math.pow(1+rate/100,years);

function automaticOasMonthly(prefix,personAge){

 if(method===2)return Math.max(0,Number(s[prefix+"OasMonthly"]||0));
 var start=Math.max(65,Math.min(70,Number(s[prefix+"OasStart"]||65)));
 var years=Math.max(0,Math.min(40,Number(s[prefix+"OasYearsCanada"]||40)));
 if(years<10)return 0;
 var residenceFactor=years/40;
 var delayFactor=1+Math.max(0,start-65)*12*.006;
 var gross=Number(s.oasBaseMonthly2026||751.97)*residenceFactor*delayFactor;
 var projectedIncome=Math.max(0,Number(s[prefix+"OasProjectedIncome"]||0));
 var yearsToStart=Math.max(0,start-Number(personAge||start));
 var threshold=Number(s.oasRecoveryThreshold2026||95323)*Math.pow(1+Number(s.inflation||0)/100,yearsToStart);
 var annualRecovery=Math.max(0,(projectedIncome-threshold)*.15);
 return Math.max(0,gross-annualRecovery/12);
}

  x=base();x.settings.retireSpend=40000;x.settings.survivorSpendingPercent=70;data=x;

  x=base();x.settings.finalExpenseAtFirstDeath=15000;x.settings.userTfsaBalance=100000;data=x;
  rows=retirementPlan(0,null,null,survivorScenarioConfig());
  deathRow=rows.find(function(r){return r.age<=70&&r.endAge>70||Math.abs(r.age-70)<.0001;});
  add(deathRow&&Math.abs(deathRow.survivorFinalExpense-15000)<1,"Final expense occurs once","The final expense is charged in the first-death period.",deathRow&&deathRow.survivorFinalExpense,15000);

function testSpendingAmount(amount,stressType){
 var s=data.settings,originalMode=s.retirementSpendingMode,originalSpend=s.retireSpend;
 s.retirementSpendingMode=1;
 s.retireSpend=amount;
 var ok=true,shortfall=0;
 try{
  var rows=retirementPlan(s.returnRate,null,stressType||null);
  for(var i=0;i<rows.length;i++){
   if(Number(rows[i].unfunded||0)>1||rows[i].depleted){ok=false;shortfall=rows[i].age;break;}
  }
 }finally{
  s.retirementSpendingMode=originalMode;
  s.retireSpend=originalSpend;
 }
 return{ok:ok,shortfall:shortfall};
}
function maximumFundedSpending(stressType){
 var s=data.settings;
 var low=0,high=Math.max(240000,Number(s.retireSpend||0)*3);
 for(var i=0;i<24;i++){
  var mid=(low+high)/2;
  if(testSpendingAmount(mid,stressType).ok)low=mid;else high=mid;
 }
 return Math.round(low/100)*100;
}
function sustainableSpendingRange(){
 var s=data.settings;
 var current=Number(s.retireSpend||0);
 var baseMax=maximumFundedSpending(null);
 var stressedMax=Math.min(
  maximumFundedSpending("crash"),
  maximumFundedSpending("badStart"),
  maximumFundedSpending("lowReturn"),
  maximumFundedSpending("highInflation"),
  maximumFundedSpending("spendingShock")
 );
 var conservative=Math.round(stressedMax*0.9/100)*100;
 var status=current<=conservative?"comfortable":current<=stressedMax?"cautious":current<=baseMax?"aggressive":"unfunded";
 return{
  current:current,
  conservative:conservative,
  stressedMax:stressedMax,
  baseMax:baseMax,
  status:status
 };
}

function retirementMarginAnalysis(){
 var s=data.settings;
 var rows=retirementPlan(s.returnRate);
 var end=rows.length?Number(rows[rows.length-1].endBalance||0):0;
 var at=accountBalancesAtRetirement(s.returnRate);
 var currentSpend=Number(s.retireSpend||0);
 var spendingRange=sustainableSpendingRange();
 var annualMargin=Math.max(0,Number(spendingRange.baseMax||0)-currentSpend);
 var percentMargin=currentSpend>0?annualMargin/currentSpend*100:0;
 var reserveYears=currentSpend>0?Number(at.total||0)/currentSpend:0;

 var scenarios=[
  {name:"Lower returns",type:"lowReturn"},
  {name:"Early market drop",type:"crash"},
  {name:"Weak first years",type:"badStart"},
  {name:"Higher inflation",type:"highInflation"},
  {name:"Higher spending",type:"spendingShock"}
 ].map(function(x){
   var r=retirementPlan(s.returnRate,null,x.type),shortfall=0,ending=0;
   for(var i=0;i<r.length;i++){if(Number(r[i].unfunded||0)>1||r[i].depleted){shortfall=r[i].age;break;}}
   ending=r.length?Number(r[r.length-1].endBalance||0):0;
   return{name:x.name,ok:!shortfall,shortfall:shortfall,ending:ending};
 });

 var strongest=scenarios.slice().sort(function(a,b){return Number(b.ending||0)-Number(a.ending||0);})[0];
 var weakest=scenarios.slice().sort(function(a,b){return Number(a.ending||0)-Number(b.ending||0);})[0];

 return{
  end:end,
  atRetirement:Number(at.total||0),
  annualMargin:annualMargin,
  percentMargin:percentMargin,
  reserveYears:reserveYears,
  scenarios:scenarios,
  strongest:strongest,
  weakest:weakest
 };
}

function retirementContentFromAudit(root,removeOnly){

function txDateObj(v){
 var s=String(v||"").trim();
 if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+"T12:00:00");
 if(/^\d{8}$/.test(s))return new Date(s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8)+"T12:00:00");
 var d=new Date(s);
 return isNaN(d.getTime())?null:d;
}
function monthKeyFromDate(d){
 return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}
function monthlyHistory(count){
 var out=[],now=new Date();
 for(var i=count-1;i>=0;i--){
  var d=new Date(now.getFullYear(),now.getMonth()-i,1);
  var key=monthKeyFromDate(d),spend=0,income=0;
  data.transactions.forEach(function(t){
   var td=txDateObj(t.date);
   if(!td||monthKeyFromDate(td)!==key)return;
   var amt=Number(t.amount||0);
   if(t.include==="Yes")spend+=Math.abs(amt);
   if(t.category==="Income")income+=Math.abs(amt);
  });
  out.push({key:key,label:d.toLocaleString("en-CA",{month:"short"}),spend:spend,income:income});
 }
 return out;
}

function recurringCandidates(){
 var counts={};
 data.transactions.forEach(function(t){
  var k=(t.description||"").trim().toUpperCase();
  if(!k)return;
  if(!counts[k])counts[k]={description:t.description,count:0,total:0};
  counts[k].count++;counts[k].total+=Math.abs(Number(t.amount||0));
 });
 return Object.values(counts).filter(function(x){return x.count>=2;}).sort(function(a,b){return b.count-a.count;}).slice(0,12);
}

function merchantReport(month){
 var m={};
 monthTransactions(month).filter(function(t){return t.include==="Yes";}).forEach(function(t){
  var k=(t.merchant||t.description||"Unknown").trim();
  if(!m[k])m[k]=0;
  m[k]+=Math.abs(Number(t.amount||0));
 });
 return Object.keys(m).map(function(k){return{name:k,total:m[k]};}).sort(function(a,b){return b.total-a.total;}).slice(0,15);
}

 monthTransactions(month).filter(function(t){return t.include==="Yes";}).forEach(function(t){

 });
 return m;

function goalPlan(extra){
 var ordered=data.goals.slice().sort(function(a,b){return Number(a.priority||0)-Number(b.priority||0);});
 var states=ordered.map(function(g){
  var remaining=String(g.name||"").toUpperCase()==="LOC"
   ?Math.max(0,Number(g.current||0))
   :Math.max(0,Number(g.target||0)-Number(g.current||0));
  return{
   name:g.name,
   remaining:remaining,
   baseMonthly:Math.max(0,Number(g.monthly||0)),
   priority:Number(g.priority||0),
   completedMonth:remaining<=0?0:null,
   firstMonthFunding:0
  };
 });
 var rollover=Math.max(0,Number(extra||0));
 var maxMonths=600;
 for(var month=1;month<=maxMonths;month++){
  var activeIndex=states.findIndex(function(x){return x.remaining>0;});
  if(activeIndex<0)break;
  var completedThisMonth=[];
  states.forEach(function(x,i){
   if(x.remaining<=0)return;
   var funding=x.baseMonthly+(i===activeIndex?rollover:0);
   if(month===1)x.firstMonthFunding=funding;
   if(funding<=0)return;
   var paid=Math.min(x.remaining,funding);
   x.remaining-=paid;
   if(x.remaining<=0.005){
    x.remaining=0;
    x.completedMonth=month;
    completedThisMonth.push(i);
   }
  });
  completedThisMonth.forEach(function(i){
   rollover+=states[i].baseMonthly;
  });
 }
 return states.map(function(x,i){
  var original=ordered[i];
  var originalRemaining=String(original.name||"").toUpperCase()==="LOC"
   ?Math.max(0,Number(original.current||0))
   :Math.max(0,Number(original.target||0)-Number(original.current||0));
  return{
   name:x.name,
   remaining:originalRemaining,
   currentMonthly:x.baseMonthly,
   firstMonthFunding:x.firstMonthFunding,
   months:x.completedMonth
  };
 });
}

function retirementReconciliationStatus(){
 try{
  var rows=retirementPlan(data.settings.returnRate);
  var bad=rows.filter(function(r){
   var start=Number(r.startBalance||0),growth=Number(r.growth||0),income=Number(r.totalIncome||0);
   var spending=Number(r.spending||0),tax=Number(r.tax||0),future=Number(r.futureExpense||0);
   var end=Number(r.endBalance||0);
   var expected=start+growth+income-spending-tax-future;
   return Math.abs(expected-end)>5;
  });
  return{ok:bad.length===0,count:bad.length};
 }catch(err){return{ok:false,count:-1,error:String(err.message||err)};}
}
function transactionDataStatus(){
 var bad=(data.transactions||[]).filter(function(t){
  return !t||typeof t!=="object"||!String(t.date||"").trim()||!isFinite(Number(t.amount));
 });
 return{ok:bad.length===0,count:bad.length};
}
function sourceOfTruthStatus(){
 var t=totals();
 return{
  investments:Math.abs(Number(t.investments)-Number(detailedInvestmentTotal()))<1,
  investing:Math.abs(Number(t.investing)-Number(detailedMonthlyInvesting()))<1,
  debt:Math.abs(Number(t.debt)-Number(authoritativeDebtTotal()))<1,
  networth:Math.abs(Number(t.networth)-(Number(t.assets)-Number(t.debt)))<1
 };
}
function foundationAudit(){
 var source=sourceOfTruthStatus();
 var retirement=retirementReconciliationStatus();
 var tx=transactionDataStatus();
 var health=validateBackupObject(data);
 var historyOk=Array.isArray(data.netWorthHistory);
 var backupOk=Array.isArray(data.backupHistory);
 var checks=[
  {name:"Investment balances",ok:source.investments,copy:"Net Worth and Retirement use detailed account balances."},
  {name:"Monthly contributions",ok:source.investing,copy:"Money and Home use detailed contribution entries."},
  {name:"Debt balances",ok:source.debt,copy:"Net Worth and Home match included Debt page accounts."},
  {name:"Net worth formula",ok:source.networth,copy:"Net worth equals assets less debt."},
  {name:"Retirement reconciliation",ok:retirement.ok,copy:retirement.ok?"All annual rows reconcile.":(retirement.count<0?"Retirement audit could not run.":retirement.count+" annual rows need review.")},
  {name:"Transaction structure",ok:tx.ok,copy:tx.ok?"All transactions have usable dates and amounts.":tx.count+" malformed transactions found."},
  {name:"Backup data health",ok:health.length===0,copy:health.length?"Backup validation found "+health.length+" issue(s).":"Current data passes backup validation."},
  {name:"Net worth history",ok:historyOk,copy:historyOk?"Snapshot history is available.":"Snapshot history is missing."},
  {name:"Recovery history",ok:backupOk,copy:backupOk?"Recovery-point storage is available.":"Recovery-point storage is missing."}
 ];
 return{checks:checks,passed:checks.filter(function(x){return x.ok;}).length,total:checks.length};
}

  debts:Array.isArray(obj.debts)?obj.debts.length:0,
  goals:Array.isArray(obj.goals)?obj.goals.length:0,
  futureExpenses:Array.isArray(obj.futureExpenses)?obj.futureExpenses.length:0,

 };

function validateBackupObject(obj){
 var errors=[];
 if(!obj||typeof obj!=="object")errors.push("Backup is not a valid object.");
 if(!obj.settings||typeof obj.settings!=="object")errors.push("Settings are missing.");
 if(!Array.isArray(obj.transactions))errors.push("Transactions are missing or invalid.");
 if(!Array.isArray(obj.budget))errors.push("Budget data is missing or invalid.");
 if(!Array.isArray(obj.goals))errors.push("Goals data is missing or invalid.");
 if(obj.settings){
  if(Number(obj.settings.age||0)<=0)errors.push("Current age is invalid.");
  if(Number(obj.settings.retireAge||0)<=Number(obj.settings.age||0))errors.push("Retirement age must be later than current age.");
  if(Number(obj.settings.retirementEndAge||0)<=Number(obj.settings.retireAge||0))errors.push("Plan-through age must be later than retirement age.");
 }
 return errors;
}
function snapshotCurrentData(label){

 snap.backupHistory=[];
 snap.lastBackupAt="";
 snap.lastAutoRecoveryAt="";
 var entry={id:Date.now(),createdAt:new Date().toISOString(),label:label||"Recovery point",data:snap};
 var history=Array.isArray(data.backupHistory)?data.backupHistory.slice():[];
 data.backupHistory=[entry].concat(history).slice(0,5);
 data.lastBackupAt=entry.createdAt;
 localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
 return entry;
}

function hasMeaningfulPlanData(){
 var s=data.settings||{};
 return Number(s.setupComplete||0)===1||
  (data.transactions||[]).length>0||
  (data.debts||[]).length>0||
  (data.goals||[]).length>0||
  (data.futureExpenses||[]).length>0||
  detailedInvestmentTotal()>0;
}
function latestRecoveryPoint(){
 var points=(data.backupHistory||[]).slice().sort(function(a,b){return String(b.createdAt||"").localeCompare(String(a.createdAt||""));});
 return points[0]||null;
}
function automaticRecoveryDue(){
 if(!hasMeaningfulPlanData())return false;
 var last=String(data.lastAutoRecoveryAt||"");
 if(!last)return true;
 var elapsed=Date.now()-new Date(last).getTime();
 return !isFinite(elapsed)||elapsed>=24*60*60*1000;
}
function createAutomaticRecoveryPoint(reason,force){
 if(!force&&!hasMeaningfulPlanData())return null;
 var entry=snapshotCurrentData(reason||"Automatic daily recovery");
 data.lastAutoRecoveryAt=entry.createdAt;
 localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
 return entry;
}

function ensureAutomaticRecoveryPoint(){
 try{
  if(automaticRecoveryDue())return createAutomaticRecoveryPoint("Automatic daily recovery");
 }catch(err){console.error("Automatic recovery skipped:",err);}
 return null;
}
function createRecoveryAction(context){

  console.error("Recovery creation failed:",err);
  message="Recovery point failed: "+String(err&&err.message?err.message:err);
 }
 var panels=document.querySelectorAll(".recovery-panel");
 panels.forEach(function(panel){
  var status=panel.querySelector?panel.querySelector(".recovery-action-status"):null;
  if(status)status.textContent=message;
  var cards=panel.querySelectorAll?panel.querySelectorAll(".recovery-card .value"):[];
  if(cards&&cards.length>=2&&entry){
   cards[0].textContent=String((data.backupHistory||[]).length)+"/5";
   cards[1].textContent=new Date(entry.createdAt).toLocaleString();
  }
 });
 return !!entry;
}

 }else if(Number(s.wifeOasMonthly||0)<=0)add("attention","Spouse OAS estimate is missing","Enter the spouse expected monthly OAS amount.");
 if(Number(s.userCppStart||0)<60||Number(s.userCppStart||0)>70)add("attention","Your CPP start age is outside 60–70","Review the CPP start age.");

function browserWorkflowChecks(skipSettings){
 var tests=[];
 function add(ok,name,detail){tests.push({ok:!!ok,name:name,detail:detail||""});}
 var originalPage=currentPageId||"home";
 try{
  var pages=["home","money","budget","planning","transactions","goals","retirement","charts","networth","life","review","reports","settings","help"];
 if(skipSettings)pages=pages.filter(function(id){return id!=="settings";});
  pages.forEach(function(id){
   var el=document.getElementById(id),fn=pageRenderers[id],ok=true,error="";
   try{
    if(typeof fn!=="function")throw new Error("Renderer missing");
    renderPage(id);
    if(!el||!String(el.innerHTML||"").trim())throw new Error("Page rendered empty");
    if(String(el.innerHTML||"").indexOf("This page could not load")>=0)throw new Error("Safe-render error shown");
   }catch(err){ok=false;error=String(err&&err.message?err.message:err);}
   add(ok,id.charAt(0).toUpperCase()+id.slice(1)+" page renders",ok?"Page produced visible content":error);
  });

  renderPage("home");
  var home=document.getElementById("home");
  add(!!(home&&home.querySelectorAll&&home.querySelectorAll(".consumer-action-button").length>0),"Home next-step buttons","At least one recommended-action button is present.");
  add(!!(home&&home.querySelector&&home.querySelector(".create-recovery-now")),"Home recovery button","Create Recovery Point button is present on Home.");

  renderPage("money");
  ["moneyImportCsv","moneyManageDebt","moneyOpenPlanning"].forEach(function(id){
   var b=document.getElementById(id);
   add(!!b&&typeof b.onclick==="function","Money control: "+id,b?"Button exists and has a click handler.":"Button missing.");
  });

  renderPage("retirement");
  var retirement=document.getElementById("retirement");
  add(!!(retirement&&retirement.querySelectorAll&&retirement.querySelectorAll(".use-scenario").length===3),"Scenario adoption buttons","All three Use this scenario buttons are present.");
  add(!!(retirement&&retirement.querySelectorAll&&retirement.querySelectorAll(".scenario-input").length===9),"Scenario input controls","Three assumptions are editable in each scenario.");

function formulaInvariantTests(){
 var tests=[];
 function add(ok,name,copy,actual,expected){
  tests.push({ok:!!ok,name:name,copy:copy,actual:actual,expected:expected});
 }
 try{
  var inv=detailedInvestmentTotal();
  var contributions=detailedMonthlyInvesting();
  add(isFinite(inv)&&inv>=0,"Investment total is finite","Detailed account balances produce a valid non-negative total.",inv,">= 0");
  add(isFinite(contributions)&&contributions>=0,"Monthly contributions are finite","Detailed monthly contributions produce a valid non-negative total.",contributions,">= 0");

  var debt=debtTotals();
  add(isFinite(debt.balance)&&debt.balance>=0,"Debt balance is finite","Included debts produce a valid balance.",debt.balance,">= 0");
  add(isFinite(debt.monthly)&&debt.monthly>=0,"Debt payment is finite","Included debt payments produce a valid monthly total.",debt.monthly,">= 0");

  var budgetTotal=(data.budget||[]).reduce(function(a,x){return a+Number(x[1]||0);},0);
  add(isFinite(budgetTotal)&&budgetTotal>=0,"Budget total is finite","Budget categories sum to a valid monthly total.",budgetTotal,">= 0");

  var balances=accountBalancesAtRetirement(Number(data.settings.returnRate||0));
  add(isFinite(Number(balances.total||0))&&Number(balances.total||0)>=0,"Retirement account projection is finite","Projected balances at retirement remain valid.",Number(balances.total||0),">= 0");

  var rows=retirementPlan(Number(data.settings.returnRate||0));
  add(Array.isArray(rows)&&rows.length>0,"Retirement projection generates rows","The plan creates at least one projection period.",rows.length,"> 0");
  add(rows.every(function(r){return isFinite(Number(r.endBalance||0))&&isFinite(Number(r.spend||0))&&isFinite(Number(r.unfunded||0));}),"Retirement rows remain finite","Every projection row has finite spending, balance and shortfall values.","All rows","All rows");
  add(rows.every(function(r){return Math.abs(Number(r.reconciliationDifference||0))<1;}),"Retirement ledger reconciles","Each projection period reconciles within one dollar.","All rows","Difference < $1");

  var first=rows[0]||{};
  add(Math.abs(Number(first.age||0)-Number(data.settings.retireAge||0))<.001,"Retirement starts at entered age","The first row uses the entered retirement age.",first.age,data.settings.retireAge);
  var last=rows[rows.length-1]||{};
  add(Math.abs(Number(last.endAge||0)-Number(data.settings.retirementEndAge||95))<.001,"Projection ends at entered age","The last row ends at the selected plan-through age.",last.endAge,data.settings.retirementEndAge);

  var tax=estimatedCanadaRegionalTax(50000,Number(data.settings.age||65),0,selectedTaxRegion());
  add(isFinite(Number(tax.total||0))&&Number(tax.total||0)>=0,"Regional tax estimate is finite","A representative $50,000 income returns valid estimated tax.",Number(tax.total||0),">= 0");

  var oas=automaticOasMonthly("user",65);

  var scen=scenarioComparisonData();

  var spend=spendingEstimate();
  add(isFinite(Number(spend.retirementEstimate||0))&&Number(spend.retirementEstimate||0)>=0,"Spending estimate is finite","Transaction-based retirement spending estimate is valid.",Number(spend.retirementEstimate||0),">= 0");

  var purchase=purchasePlanAnalysis(),vehicle=vehiclePlanAnalysis(),travel=travelPlanAnalysis(),health=healthcarePlanAnalysis();
  add([purchase.remaining,purchase.monthly,vehicle.monthlySave,travel.total,travel.monthly,health.reserveGap,health.monthlyReserve].every(function(v){return isFinite(Number(v));}),"Planning calculators remain finite","Purchase, vehicle, travel and healthcare planners return valid values.","All calculators","Finite");
 }catch(err){
  add(false,"Formula invariant execution","The formula invariant suite stopped unexpectedly.",String(err&&err.message?err.message:err),"No error");
 }
 return{tests:tests,pass:tests.filter(function(x){return x.ok;}).length,total:tests.length};

  }
 }

function formatTestBookValue(value){
 if(value===null||value===undefined)return"—";

  if(!isFinite(value))return String(value);

 }
 if(typeof value==="boolean")return value?"True":"False";
 return String(value);
}
function testBookDifference(actual,expected){
 var a=Number(actual),e=Number(expected);
 if(isFinite(a)&&isFinite(e))return a-e;

}

    copy:String(t.copy||""),
    actual:t.actual,
    expected:t.expected,

}
