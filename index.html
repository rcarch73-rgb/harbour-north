<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#17365D"><title>RyanOS</title><link rel="manifest" href="manifest.json"><style>

</style></head><body><header><div><h1>RyanOS</h1><small>v1.2</small></div><button onclick="exportData()">Export</button></header><div class="wrap"><nav id="nav"></nav><main><div class="notice"><strong>v1.2 update:</strong> this version migrates data from the original RyanOS app. If the old screen appears, refresh the GitHub Pages site in Safari once, then reopen the Home Screen app.</div><section id="home" class="page active"></section><section id="money" class="page"></section><section id="transactions" class="page"></section><section id="rules" class="page"></section><section id="goals" class="page"></section><section id="life" class="page"></section><section id="settings" class="page"></section></main></div><script>
const defaults={settings:{income1:5428.78,income2:5147.32,wcb:1352.34,investing:2600,bills:1200,chores:173,loc:23000,rate:5.19,months:24,investments:520000,home:650000,ns1:100000,ns2:40000,vehicles:25000,boat:18000,camper:15000,cash:0,cc:0},budget:[["Groceries",1400],["Dining",700],["Transportation",550],["Vehicle",500],["Home & Garden",600],["Utilities",600],["Subscriptions",175],["Shopping & Personal",550],["Pets",150],["Entertainment",200],["Alcohol",250],["Boat & Outdoor",300],["Travel",500],["Medical",75],["Education",70],["Donations & Family",75],["Miscellaneous",300]],goals:[{name:"Son's car",target:6000,current:0,monthly:500,priority:1},{name:"LOC",target:23000,current:23000,monthly:0,priority:2},{name:"Emergency fund",target:4000,current:0,monthly:150,priority:3},{name:"Garmin",target:1300,current:0,monthly:100,priority:4},{name:"Fence",target:6000,current:0,monthly:0,priority:5}],life:[{name:"Future home build",target:500000,saved:0,year:2032,notes:"House, well, septic, shop and site work"},{name:"Vehicle replacement",target:45000,saved:0,year:2029,notes:"2017 Subaru replacement"},{name:"Caribbean trip",target:15000,saved:0,year:2028,notes:"Backpacking and sail crewing"}],rules:[{key:"SAVE ON",cat:"Groceries",inc:"Yes"},{key:"SAFEWAY",cat:"Groceries",inc:"Yes"},{key:"TIM HORTONS",cat:"Dining",inc:"Yes"},{key:"MCDONALD",cat:"Dining",inc:"Yes"},{key:"SHELL",cat:"Transportation",inc:"Yes"},{key:"PETRO",cat:"Transportation",inc:"Yes"},{key:"HOME DEPOT",cat:"Home & Garden",inc:"Yes"},{key:"ROGERS",cat:"Utilities",inc:"Yes"},{key:"NETFLIX",cat:"Subscriptions",inc:"Yes"},{key:"AMZN",cat:"Shopping & Personal",inc:"Yes"},{key:"LIQUOR",cat:"Alcohol",inc:"Yes"},{key:"WESTJET",cat:"Travel",inc:"Yes"},{key:"LOC",cat:"Debt",inc:"No"},{key:"YELLOWHEAD",cat:"Income",inc:"No"},{key:"PROVINCE",cat:"Income",inc:"No"},{key:"WCB",cat:"Income",inc:"No"}],tx:[]};function migrate(raw){
  if(!raw) return JSON.parse(JSON.stringify(defaults));
  const out=JSON.parse(JSON.stringify(defaults));
  const s=raw.settings||{};
  out.settings={
    income1:Number(s.income1??s.yellowhead??defaults.settings.income1),
    income2:Number(s.income2??s.province??defaults.settings.income2),
    wcb:Number(s.wcb??defaults.settings.wcb),
    investing:Number(s.investing??defaults.settings.investing),
    bills:Number(s.bills??s.annualBills??defaults.settings.bills),
    chores:Number(s.chores??defaults.settings.chores),

    investments:Number(s.investments??s.currentInvestments??defaults.settings.investments),
    home:Number(s.home??defaults.settings.home),
    ns1:Number(s.ns1??defaults.settings.ns1),
    ns2:Number(s.ns2??defaults.settings.ns2),
    vehicles:Number(s.vehicles??defaults.settings.vehicles),
    boat:Number(s.boat??defaults.settings.boat),
    camper:Number(s.camper??defaults.settings.camper),
    cash:Number(s.cash??defaults.settings.cash),
    cc:Number(s.cc??s.ccDebt??defaults.settings.cc)
  };
  out.budget=Array.isArray(raw.budget)?raw.budget:defaults.budget;
  out.goals=Array.isArray(raw.goals)?raw.goals:defaults.goals;
  out.life=Array.isArray(raw.life)?raw.life:
    Array.isArray(raw.lifePlans)?raw.lifePlans.map(p=>({name:p.name,target:Number(p.target||0),saved:Number(p.saved||0),year:Number(p.year??p.targetYear??new Date().getFullYear()+1),notes:p.notes||''})):defaults.life;
  out.rules=Array.isArray(raw.rules)?raw.rules.map(r=>({key:r.key??r.keyword??'',cat:r.cat??r.category??'Miscellaneous',inc:r.inc??r.include??'Yes'})):defaults.rules;
  out.tx=Array.isArray(raw.tx)?raw.tx:
    Array.isArray(raw.transactions)?raw.transactions.map(t=>({date:t.date||'',desc:t.desc??t.description??'',amount:Number(t.amount||0),cat:t.cat??t.category??'Miscellaneous',inc:t.inc??t.include??'Yes'})):[];
  return out;
}
let data=migrate(JSON.parse(localStorage.getItem('ryanos-data')||'null'));
localStorage.setItem('ryanos-data',JSON.stringify(data));const pages=[["home","Home"],["money","Money"],["transactions","Transactions"],["rules","Merchant Rules"],["goals","Goals & Debt"],["life","Life Goals"],["settings","Settings"]],$=x=>document.getElementById(x),fmt=n=>new Intl.NumberFormat('en-CA',{style:'currency',currency:'CAD',maximumFractionDigits:0}).format(Number(n||0));function save(){localStorage.setItem('ryanos-data',JSON.stringify(data));render()}function pmt(){let s=data.settings,r=s.rate/1200;return r?s.loc*r/(1-Math.pow(1+r,-s.months)):s.loc/s.months}function totals(){let s=data.settings,inc=s.income1+s.income2+s.wcb,sp=data.budget.reduce((a,x)=>a+Number(x[1]),0),gf=data.goals.filter(g=>g.name!=='LOC').reduce((a,g)=>a+Number(g.monthly),0),sur=inc-sp-s.investing-s.bills-s.chores-pmt()-gf,assets=s.investments+s.home+s.ns1+s.ns2+s.vehicles+s.boat+s.camper+s.cash,debt=s.loc+s.cc;return{inc,sp,gf,sur,assets,debt,nw:assets-debt}}function nav(){$('nav').innerHTML=pages.map((p,i)=>`<button class="${i?'':'active'}" onclick="show('${p[0]}',this)">${p[1]}</button>`).join('')}function show(id,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}function spend(){return data.tx.filter(x=>x.inc==='Yes').reduce((a,x)=>a+Math.abs(Number(x.amount||0)),0)}function bycat(){let m={};data.tx.filter(x=>x.inc==='Yes').forEach(x=>m[x.cat]=(m[x.cat]||0)+Math.abs(Number(x.amount||0)));return m}function health(){let t=totals(),v=50;if(t.sur>=0)v+=20;else v-=10;if(data.settings.loc<23000)v+=10;if(spend()<=t.sp)v+=10;if(data.settings.investments>=520000)v+=10;return Math.max(0,Math.min(100,v))}
function renderHome(){let t=totals();$('home').innerHTML=`<h2>Home</h2><div class="grid"><div class="card"><small>Monthly income</small><div class="metric">${fmt(t.inc)}</div></div><div class="card"><small>Monthly surplus</small><div class="metric ${t.sur>=0?'good':'bad'}">${fmt(t.sur)}</div></div><div class="card"><small>Net worth</small><div class="metric">${fmt(t.nw)}</div></div><div class="card"><small>Health score</small><div class="metric">${health()}/100</div></div></div><div class="card"><h3>Priority goals</h3>${[...data.goals].sort((a,b)=>a.priority-b.priority).map(g=>{let q=g.name==='LOC'?(1-g.current/g.target)*100:g.current/g.target*100;return `<p><b>${g.priority}. ${g.name}</b> — ${fmt(g.current)} / ${fmt(g.target)}</p><div class="progress"><span style="width:${Math.max(0,Math.min(100,q))}%"></span></div>`}).join('')}</div>`}
function renderMoney(){let t=totals(),m=bycat();$('money').innerHTML=`<h2>Money</h2><div class="grid"><div class="card"><small>Budget</small><div class="metric">${fmt(t.sp)}</div></div><div class="card"><small>Imported spending</small><div class="metric">${fmt(spend())}</div></div><div class="card"><small>LOC payment</small><div class="metric">${fmt(pmt())}</div></div><div class="card"><small>Monthly result</small><div class="metric ${t.sur>=0?'good':'bad'}">${fmt(t.sur)}</div></div></div><div class="card"><table><tr><th>Category</th><th>Budget</th><th>Actual</th><th>Remaining</th></tr>${data.budget.map((x,i)=>`<tr><td>${x[0]}</td><td><input type=number value="${x[1]}" onchange="data.budget[${i}][1]=+this.value;save()"></td><td>${fmt(m[x[0]]||0)}</td><td>${fmt(x[1]-(m[x[0]]||0))}</td></tr>`).join('')}</table></div>`}
function rule(desc){desc=(desc||'').toUpperCase();let r=data.rules.find(x=>desc.includes((x.key||'').toUpperCase()));return r||{cat:'Miscellaneous',inc:'Yes'}}function csv(text){let ls=text.trim().split(/
?
/),h=ls.shift().split(',').map(x=>x.replace(/^"|"$/g,'').toLowerCase()),find=a=>h.findIndex(x=>a.some(y=>x.includes(y))),di=find(['date']),xi=find(['description','details','merchant']),ai=find(['amount']);return ls.map(line=>{let c=(line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)||[]).map(x=>x.replace(/^"|"$/g,'').replace(/""/g,'"')),d=c[xi]||'',a=Number((c[ai]||'0').replace(/[$,]/g,'')),r=rule(d);return{date:c[di]||'',desc:d,amount:a,cat:r.cat,inc:r.inc}})}function importCsv(){let f=$('csv').files[0];if(!f)return alert('Choose a CSV file');let r=new FileReader();r.onload=()=>{data.tx=data.tx.concat(csv(r.result));save()};r.readAsText(f)}function applyRules(){data.tx.forEach(x=>{let r=rule(x.desc);x.cat=r.cat;x.inc=r.inc});save()}function renderTx(){$('transactions').innerHTML=`<h2>Transactions</h2><div class="toolbar"><input id=csv type=file accept=.csv><button class=primary onclick="importCsv()">Import CSV</button><button onclick="applyRules()">Apply Rules</button><button onclick="if(confirm('Clear all?')){data.tx=[];save()}">Clear</button></div><div class=notice>Correct a transaction, then add a merchant rule so future imports remember it.</div><div class=card><table><tr><th>Date</th><th>Description</th><th>Amount</th><th>Category</th><th>Include?</th><th></th></tr>${data.tx.map((x,i)=>`<tr><td>${x.date}</td><td>${x.desc}</td><td>${fmt(x.amount)}</td><td><input value="${x.cat}" onchange="data.tx[${i}].cat=this.value;save()"></td><td><select onchange="data.tx[${i}].inc=this.value;save()"><option ${x.inc==='Yes'?'selected':''}>Yes</option><option ${x.inc!=='Yes'?'selected':''}>No</option></select></td><td><button onclick="data.tx.splice(${i},1);save()">Delete</button></td></tr>`).join('')}</table></div>`}
function renderRules(){$('rules').innerHTML=`<h2>Merchant Rules</h2><div class=toolbar><button class=primary onclick="data.rules.push({key:'',cat:'Miscellaneous',inc:'Yes'});save()">Add Rule</button><button onclick="applyRules()">Apply to Existing</button></div><div class=card><table><tr><th>Keyword</th><th>Category</th><th>Include?</th><th></th></tr>${data.rules.map((r,i)=>`<tr><td><input value="${r.key}" onchange="data.rules[${i}].key=this.value;save()"></td><td><input value="${r.cat}" onchange="data.rules[${i}].cat=this.value;save()"></td><td><select onchange="data.rules[${i}].inc=this.value;save()"><option ${r.inc==='Yes'?'selected':''}>Yes</option><option ${r.inc!=='Yes'?'selected':''}>No</option></select></td><td><button onclick="data.rules.splice(${i},1);save()">Delete</button></td></tr>`).join('')}</table></div>`}
function renderGoals(){let t=totals(),loc=data.goals.find(g=>g.name==='LOC');if(loc)loc.monthly=pmt();$('goals').innerHTML=`<h2>Goals & Debt</h2><div class=card><table><tr><th>Priority</th><th>Goal</th><th>Target</th><th>Current</th><th>Monthly</th><th>Months</th></tr>${[...data.goals].sort((a,b)=>a.priority-b.priority).map(g=>{let i=data.goals.indexOf(g),mo=g.monthly?Math.ceil(Math.max(g.target-g.current,0)/g.monthly):'—';return `<tr><td><input type=number value="${g.priority}" onchange="data.goals[${i}].priority=+this.value;save()"></td><td><input value="${g.name}" onchange="data.goals[${i}].name=this.value;save()"></td><td><input type=number value="${g.target}" onchange="data.goals[${i}].target=+this.value;save()"></td><td><input type=number value="${g.current}" onchange="data.goals[${i}].current=+this.value;save()"></td><td><input type=number value="${g.monthly}" onchange="data.goals[${i}].monthly=+this.value;save()"></td><td>${mo}</td></tr>`}).join('')}</table></div>`}
function renderLife(){$('life').innerHTML=`<h2>Life Goals</h2><div class=toolbar><button class=primary onclick="data.life.push({name:'New goal',target:0,saved:0,year:new Date().getFullYear()+1,notes:''});save()">Add Life Goal</button></div><div class=card><table><tr><th>Goal</th><th>Target</th><th>Saved</th><th>Year</th><th>Progress</th><th>Notes</th><th></th></tr>${data.life.map((p,i)=>`<tr><td><input value="${p.name}" onchange="data.life[${i}].name=this.value;save()"></td><td><input type=number value="${p.target}" onchange="data.life[${i}].target=+this.value;save()"></td><td><input type=number value="${p.saved}" onchange="data.life[${i}].saved=+this.value;save()"></td><td><input type=number value="${p.year}" onchange="data.life[${i}].year=+this.value;save()"></td><td>${p.target?Math.round(p.saved/p.target*100):0}%</td><td><input value="${p.notes||''}" onchange="data.life[${i}].notes=this.value;save()"></td><td><button onclick="data.life.splice(${i},1);save()">Delete</button></td></tr>`).join('')}</table></div>`}
function renderSettings(){let s=data.settings,fs=[['income1','Yellowhead monthly income'],['income2','Province monthly income'],['wcb','WorkSafeBC monthly income'],['investing','Retirement investing'],['bills','Annual-bills reserve'],['chores','Son's chores'],['loc','LOC balance'],['rate','LOC rate (%)'],['months','LOC months'],['investments','Investments'],['home','Home'],['ns1','NS property 1'],['ns2','NS property 2'],['vehicles','Vehicles'],['boat','Boat'],['camper','Camper'],['cash','Cash'],['cc','Credit-card debt']];$('settings').innerHTML=`<h2>Settings</h2><div class=toolbar><button onclick="exportData()">Export Backup</button><input id=json type=file accept=.json><button onclick="importData()">Import Backup</button></div><div class=card><div class=formgrid>${fs.map(f=>`<label>${f[1]}<input type=number step=any value="${s[f[0]]}" onchange="data.settings['${f[0]}']=+this.value;save()"></label>`).join('')}</div></div>`}
function exportData(){let b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='RyanOS-backup.json';a.click()}function importData(){let f=$('json').files[0];if(!f)return alert('Choose backup');let r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);save()};r.readAsText(f)}function render(){renderHome();renderMoney();renderTx();renderRules();renderGoals();renderLife();renderSettings()}nav();render();if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script></body></html>
